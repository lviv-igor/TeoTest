<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ТеоТест</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Arial Narrow', Arial, sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 10px 16px 6px;
    flex-shrink: 0;
    letter-spacing: 2px;
  }
  .header .logo {
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 400;
    letter-spacing: 3px;
    color: #fff;
    text-transform: uppercase;
  }
  .header .logo span { color: #cc0000; }

  /* ===== SCREEN ===== */
  .screen {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* ===== HOME SCREEN ===== */
  #home {
    justify-content: space-between;
  }
  .mosaic {
    width: 100%;
    height: 38vh;
    background: linear-gradient(135deg,
      #1a1a1a 0%, #2a2a2a 10%, #111 20%, #333 30%,
      #1a1a1a 40%, #222 50%, #2a2a2a 60%, #111 70%,
      #333 80%, #1a1a1a 90%, #222 100%);
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 1px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .mosaic-cell {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #444;
    overflow: hidden;
  }
  .mosaic-cell:nth-child(odd) { background: #222; }
  .mosaic-cell:nth-child(3n) { background: #111; }
  .mosaic-symbols { font-size: 14px; color: #555; }

  .home-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    gap: 12px;
  }
  .home-title {
    font-size: clamp(38px, 14vw, 72px);
    font-weight: 100;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
    text-transform: uppercase;
    width: 100%;
  }
  .home-title .god { color: #cc0000; font-weight: 100; }
  .home-subtitle {
    font-size: clamp(12px, 3.5vw, 16px);
    color: #aaa;
    text-align: center;
    letter-spacing: 1px;
  }
  .home-subtitle span { color: #cc0000; }

  .btn-start {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: 16px 0;
    width: 100%;
    font-size: clamp(16px, 4.5vw, 20px);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 8px;
  }
  .btn-start:active { background: #aa0000; }

  .home-bottom {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: #333;
    flex-shrink: 0;
  }
  .home-bottom-cell {
    background: #000;
    padding: 14px 12px;
    text-align: center;
  }
  .home-bottom-cell .label {
    font-size: 9px;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .home-bottom-cell .title-sm {
    font-size: clamp(13px, 3.5vw, 16px);
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
  }
  .home-bottom-cell .title-sm span { color: #cc0000; }

  /* ===== QUESTION SCREEN ===== */
  #question {
    flex-direction: column;
    justify-content: space-between;
    padding: 0;
  }

  .q-top {
    flex-shrink: 0;
    padding: 6px 16px 4px;
  }

  .progress-bar {
    width: 100%;
    height: 3px;
    background: #333;
    border-radius: 2px;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: #cc0000;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .q-label-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .q-label {
    font-size: clamp(13px, 3.8vw, 17px);
    font-weight: 300;
    letter-spacing: 4px;
    color: #ccc;
    text-transform: uppercase;
    text-align: center;
  }
  .hint-btn {
    width: 22px;
    height: 22px;
    background: #cc0000;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .q-text {
    font-size: clamp(20px, 6vw, 28px);
    font-weight: 300;
    line-height: 1.25;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 16px 0;
    flex-shrink: 0;
  }

  .q-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6px 16px 0;
    overflow: hidden;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .option-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 2px 0;
  }
  .option-label input[type="radio"] {
    appearance: none;
    width: 18px;
    height: 18px;
    border: 1.5px solid #888;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
  }
  .option-label input[type="radio"]:checked {
    border-color: #fff;
  }
  .option-label input[type="radio"]:checked::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
  }
  .option-label span {
    font-size: clamp(15px, 4.2vw, 19px);
    font-weight: 300;
    letter-spacing: 1px;
    color: #fff;
  }

  .notes-area {
    width: 100%;
    background: #fff;
    color: #333;
    border: none;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: clamp(13px, 3.5vw, 15px);
    resize: none;
    flex-shrink: 0;
    height: 14vw;
    max-height: 80px;
    min-height: 50px;
    margin-top: 6px;
    font-family: Arial, sans-serif;
  }
  .notes-area::placeholder { color: #999; }

  .btn-next {
    background: transparent;
    color: #555;
    border: none;
    padding: 14px 0;
    width: 100%;
    font-size: clamp(28px, 9vw, 44px);
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .btn-next:active { color: #888; }

  /* ===== HINT OVERLAY ===== */
  .hint-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .hint-overlay.show { display: flex; }
  .hint-box {
    background: #1a1a1a;
    border: 1px solid #cc0000;
    border-radius: 10px;
    padding: 24px 20px;
    max-width: 360px;
    width: 100%;
    position: relative;
  }
  .hint-box h3 {
    color: #cc0000;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .hint-box p {
    color: #ddd;
    font-size: 15px;
    line-height: 1.6;
    font-weight: 300;
  }
  .hint-close {
    position: absolute;
    top: 10px; right: 14px;
    background: none;
    border: none;
    color: #888;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }

  /* ===== RESULT SCREEN ===== */
  #result {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px 20px;
    text-align: center;
    gap: 16px;
  }
  .result-type {
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .result-type span { color: #cc0000; }
  .result-verse {
    font-size: clamp(14px, 4vw, 18px);
    color: #ccc;
    font-style: italic;
    line-height: 1.6;
    max-width: 320px;
  }
  .result-ref {
    font-size: 13px;
    color: #cc0000;
    letter-spacing: 2px;
  }
  .result-desc {
    font-size: clamp(13px, 3.5vw, 15px);
    color: #aaa;
    line-height: 1.5;
    max-width: 320px;
  }
  .btn-restart {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: 14px 0;
    width: 100%;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">ТЕО<span>ТЕСТ</span>®</div>
</div>

<!-- HOME SCREEN -->
<div class="screen active" id="home">
  <div class="mosaic" id="mosaic"></div>

  <div class="home-center">
    <div class="home-title">ТЕО<span class="god">ТЕСТ</span>®</div>
    <div class="home-subtitle">10 запитань. <span>Назавжди</span> жити з відповідями.</div>
    <button class="btn-start" id="btnStart">РОЗПОЧАТИ ТЕСТ</button>
  </div>

  <div class="home-bottom">
    <div class="home-bottom-cell">
      <div class="label">Ресурси</div>
      <div class="title-sm">ТЕО<span>ТЕСТ</span></div>
    </div>
    <div class="home-bottom-cell">
      <div class="label">Підготовка</div>
      <div class="title-sm">ДЛЯ <span>ВЕДУЧОГО</span></div>
    </div>
  </div>
</div>

<!-- QUESTION SCREEN -->
<div class="screen" id="question">
  <div class="q-top">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="q-label-row">
      <div class="q-label" id="qLabel">ЗАПИТАННЯ 1</div>
      <button class="hint-btn" id="hintBtn">?</button>
    </div>
  </div>

  <div class="q-text" id="qText"></div>

  <div class="q-body">
    <div class="options" id="optionsContainer"></div>
    <textarea class="notes-area" id="notesArea" placeholder="Додаткові коментарі"></textarea>
  </div>

  <button class="btn-next" id="btnNext">ДАЛІ ›</button>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="result">
  <div class="result-type" id="resultType"></div>
  <div class="result-verse" id="resultVerse"></div>
  <div class="result-ref" id="resultRef"></div>
  <div class="result-desc" id="resultDesc"></div>
  <button class="btn-restart" id="btnRestart">ПРОЙТИ ЩЕ РАЗ</button>
</div>

<!-- HINT OVERLAY -->
<div class="hint-overlay" id="hintOverlay">
  <div class="hint-box">
    <button class="hint-close" id="hintClose">✕</button>
    <h3>Підказка для ведучого</h3>
    <p id="hintText"></p>
  </div>
</div>

<script>
// ===== MOSAIC =====
const symbols = ['✝','☪','✡','☸','🕉','☯','⛎','✦','⚛','∞','Ω','α','E=mc²','DNA','?','!'];
const mosaic = document.getElementById('mosaic');
for(let i=0;i<24;i++){
  const cell = document.createElement('div');
  cell.className = 'mosaic-cell';
  if(Math.random()>0.5){
    const s = document.createElement('span');
    s.className = 'mosaic-symbols';
    s.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    cell.appendChild(s);
  }
  mosaic.appendChild(cell);
}

// ===== QUESTIONS =====
const skepticQuestions = [
  {
    text: "ЧИ ВІРИТЕ ВИ В ІСНУВАННЯ БОГА АБО ВИЩОЇ СИЛИ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Це відкривальне запитання. Воно допомагає зрозуміти стартову позицію людини і задає тон усьому діалогу. Не сперечайтесь — просто слухайте."
  },
  {
    text: "ЧИ ВВАЖАЄТЕ ВИ, ЩО ВСЕСВІТ МАЄ ПРИЧИНУ СВОГО ІСНУВАННЯ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Питання про першопричину. Допомагає перейти від особистої позиції до філософського мислення. Мета — не довести Бога, а відкрити простір для роздумів."
  },
  {
    text: "ЧИ ІСНУЄ, НА ВАШУ ДУМКУ, ОБ'ЄКТИВНА МОРАЛЬ — ТА, ЩО НЕ ЗАЛЕЖИТЬ ВІД ЛЮДСЬКОЇ ДУМКИ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Якщо людина каже 'так' — це відкриває розмову про джерело моралі. Якщо 'ні' — можна запитати: 'Тоді чи може щось бути справді злим?'"
  },
  {
    text: "ЧИ ЗНАХОДИТЕ ВИ ЯКИЙСЬ ВИЩИЙ СЕНС АБО МЕТУ У ВСЕСВІТІ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Питання про телеологію. Якщо людина відчуває сенс — звідки він? Якщо ні — чи комфортно їй жити без нього? Це особисте і важливе питання."
  },
  {
    text: "ЧИ ВВАЖАЄТЕ ВИ, ЩО НАУКА МОЖЕ ВІДПОВІСТИ НА ВСІ ВАЖЛИВІ ПИТАННЯ ЛЮДСЬКОГО БУТТЯ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Допомагає дослідити межі науки. Наука чудово пояснює 'як', але чи відповідає вона на 'навіщо'? Не атакуйте науку — визнайте її цінність і запитайте про межі."
  },
  {
    text: "ЧИ ВВАЖАЄТЕ ВИ, ЩО ЛЮДСЬКЕ СВІДОМІСТЬ — ЦЕ ЛИШЕ РЕЗУЛЬТАТ ФІЗИЧНИХ ПРОЦЕСІВ МОЗКУ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Питання про природу свідомості. Якщо ми лише нейрони — чи мають значення наші думки і рішення? Це відкриває тему душі і особистості."
  },
  {
    text: "ЧИ ВВАЖАЄТЕ ВИ, ЩО ІСНУВАННЯ ЗЛА І СТРАЖДАНЬ СУПЕРЕЧИТЬ ІСНУВАННЮ ДОБРОГО БОГА?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Одне з найважливіших заперечень. Слухайте уважно — за цим питанням часто стоїть особистий біль. Не поспішайте з відповіддю. Спочатку — співчуття."
  },
  {
    text: "ЧИ ЧИТАЛИ ВИ БУДЬ-КОЛИ ЄВАНГЕЛІЄ АБО БІБЛІЮ?",
    options: ["Так", "Ні", "Частково"],
    hint: "Практичне питання. Допомагає зрозуміти рівень знайомства з першоджерелом. Багато людей мають думку про Біблію, не читавши її — це відкриває цікаву розмову."
  },
  {
    text: "ЧИ ХОТІЛИ Б ВИ ДІЗНАТИСЬ, ЩО ГОВОРИТЬ БІБЛІЯ ПРО ЦІ ПИТАННЯ?",
    options: ["Так", "Ні", "Можливо"],
    hint: "Перехідне питання до Євангелія. Якщо людина відповідає 'так' або 'можливо' — це запрошення поділитись Благою Вісткою. Будьте готові до короткого пояснення."
  },
  {
    text: "ЧИ ВІДКРИТІ ВИ ДО ТОГО, ЩОБ ОСОБИСТО ДОСЛІДИТИ ПИТАННЯ ІСНУВАННЯ БОГА?",
    options: ["Так", "Ні", "Потребую часу"],
    hint: "Фінальне запитання. Мета — не отримати 'правильну' відповідь, а відкрити двері для подальшого діалогу. Будь-яка відповідь — це можливість для наступного кроку."
  }
];

const believerQuestions = [
  {
    text: "ЧИ ВІРИТЕ ВИ В ІСНУВАННЯ БОГА АБО ВИЩОЇ СИЛИ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Стартове питання. Навіть серед 'віруючих' розуміння Бога дуже різне. Слухайте — це допоможе зрозуміти, який Бог для них."
  },
  {
    text: "ЯК БИ ВИ ОПИСАЛИ СВОЇ СТОСУНКИ З БОГОМ?",
    options: ["Особисті і живі", "Більше релігійні", "Поки що формальні"],
    hint: "Розкриває різницю між релігійністю і живою вірою. Не судіть — просто слухайте і задавайте уточнюючі питання."
  },
  {
    text: "ЧИ МАЄТЕ ВИ ВПЕВНЕНІСТЬ, ЩО ПОТРАПИТЕ НА НЕБО?",
    options: ["Так, впевнений(а)", "Сподіваюсь", "Не знаю"],
    hint: "Ключове питання для розмови про спасіння. Якщо людина не впевнена — це відкриває тему благодаті і Євангелія. Якщо впевнена — запитайте на чому ця впевненість."
  },
  {
    text: "ЧИ ЗНАХОДИТЕ ВИ ЯКИЙСЬ ВИЩИЙ СЕНС АБО МЕТУ У ВСЕСВІТІ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Питання про телеологію з позиції віруючого. Чи пов'язаний їхній сенс з Богом? Чи це просто загальне відчуття?"
  },
  {
    text: "ЧИ ВІДЧУВАЄТЕ ВИ, ЩО БОГ ОСОБИСТО ПІКЛУЄТЬСЯ ПРО ВАС?",
    options: ["Так, відчуваю", "Іноді", "Важко сказати"],
    hint: "Питання про особистий досвід Бога. Відповідь 'іноді' або 'важко сказати' може відкрити розмову про сумніви, страждання або духовну сухість."
  },
  {
    text: "ЧИ ЧИТАЄТЕ ВИ БІБЛІЮ РЕГУЛЯРНО?",
    options: ["Так, регулярно", "Час від часу", "Рідко або ні"],
    hint: "Практичне питання про духовні дисципліни. Не засуджуйте — використайте як можливість поговорити про важливість Слова Божого."
  },
  {
    text: "ЧИ Є У ВАС СПІЛЬНОТА ВІРУЮЧИХ, З ЯКОЮ ВИ РЕГУЛЯРНО ЗУСТРІЧАЄТЕСЬ?",
    options: ["Так", "Ні", "Шукаю таку"],
    hint: "Питання про церкву і спільноту. Якщо людина шукає — це запрошення познайомити її з вашою церквою."
  },
  {
    text: "ЧИ ДІЛИТЕСЬ ВИ СВОЄЮ ВІРОЮ З ІНШИМИ ЛЮДЬМИ?",
    options: ["Так, активно", "Іноді", "Важко це робити"],
    hint: "Питання про євангелізацію. Якщо важко — можна поговорити про страхи і як їх подолати. Це також тема для навчання."
  },
  {
    text: "ЧИ ХОТІЛИ Б ВИ ГЛИБШЕ ДІЗНАТИСЬ ПРО БІБЛІЙНІ ОСНОВИ ВАШОЇ ВІРИ?",
    options: ["Так", "Вже вивчаю", "Поки не готовий(а)"],
    hint: "Перехідне питання до запрошення на навчання або малу групу. Якщо 'так' — розкажіть про можливості у вашій церкві."
  },
  {
    text: "ЧИ ВІДКРИТІ ВИ ДО ТОГО, ЩОБ ЗРОБИТИ НАСТУПНИЙ КРОК У СВОЇЙ ВІРІ?",
    options: ["Так, готовий(а)", "Думаю про це", "Потребую часу"],
    hint: "Фінальне запрошення. Будь-яка відповідь — це можливість для подальшого діалогу і супроводу. Запропонуйте конкретний наступний крок."
  }
];

// ===== STATE =====
let currentQuestions = [];
let currentIndex = 0;
let answers = [];
let branch = 'skeptic';

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== START =====
document.getElementById('btnStart').addEventListener('click', function() {
  branch = 'skeptic';
  currentQuestions = skepticQuestions;
  currentIndex = 0;
  answers = [];
  showQuestion();
  showScreen('question');
});

// ===== SHOW QUESTION =====
function showQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;

  document.getElementById('qLabel').textContent = 'ЗАПИТАННЯ ' + (currentIndex + 1);
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressFill').style.width = ((currentIndex + 1) / total * 100) + '%';
  document.getElementById('notesArea').value = answers[currentIndex]?.note || '';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const label = document.createElement('label');
    label.className = 'option-label';
    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'option';
    radio.value = i;
    if (answers[currentIndex]?.selected == i) radio.checked = true;
    const span = document.createElement('span');
    span.textContent = opt;
    label.appendChild(radio);
    label.appendChild(span);
    container.appendChild(label);
  });
}

// ===== NEXT =====
document.getElementById('btnNext').addEventListener('click', function() {
  const selected = document.querySelector('input[name="option"]:checked');
  const note = document.getElementById('notesArea').value;
  answers[currentIndex] = { selected: selected ? selected.value : null, note };

  // Branch logic on Q1
  if (currentIndex === 0 && selected) {
    const val = parseInt(selected.value);
    if (val === 0) { // "Так" — believer
      branch = 'believer';
      currentQuestions = believerQuestions;
      answers = [answers[0]];
    }
  }

  currentIndex++;
  if (currentIndex < currentQuestions.length) {
    showQuestion();
  } else {
    showResult();
  }
});

// ===== HINT =====
document.getElementById('hintBtn').addEventListener('click', function() {
  const q = currentQuestions[currentIndex];
  document.getElementById('hintText').textContent = q.hint;
  document.getElementById('hintOverlay').classList.add('show');
});
document.getElementById('hintClose').addEventListener('click', function() {
  document.getElementById('hintOverlay').classList.remove('show');
});
document.getElementById('hintOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('show');
});

// ===== RESULT =====
function showResult() {
  showScreen('result');
  const yesCount = answers.filter(a => a.selected == 0).length;
  let type, verse, ref, desc;

  if (branch === 'believer') {
    if (yesCount >= 7) {
      type = 'ЗРІЛА <span>ВІРА</span>';
      verse = '"Я знаю, в Кого я вірив, і переконаний, що Він може зберегти довірене мені до того дня."';
      ref = '2 ТИМ. 1:12';
      desc = 'Ваша віра — зріла і свідома. Продовжуйте зростати і вести інших.';
    } else {
      type = 'ВІРА В <span>ЗРОСТАННІ</span>';
      verse = '"Зростайте в благодаті та пізнанні Господа нашого і Спасителя Ісуса Христа."';
      ref = '2 ПЕТ. 3:18';
      desc = 'Ваша віра розвивається. Наступний крок — глибше вивчення Слова і спільнота.';
    }
  } else {
    if (yesCount >= 6) {
      type = 'ВІДКРИТИЙ <span>ШУКАЧ</span>';
      verse = '"Шукайте, і знайдете; стукайте, і відчинять вам."';
      ref = 'МТ. 7:7';
      desc = 'Ви відкриті до пошуку істини. Це чудовий початок для глибшого дослідження.';
    } else if (yesCount >= 3) {
      type = 'ДУХОВНИЙ <span>МАНДРІВНИК</span>';
      verse = '"Бо Він не далеко від кожного з нас."';
      ref = 'ДІЇ 17:27';
      desc = 'У вас є питання і сумніви — це нормально. Бог відкритий до чесного діалогу.';
    } else {
      type = 'ЧЕСНИЙ <span>СКЕПТИК</span>';
      verse = '"Прийдіть і розміркуймо разом, — каже Господь."';
      ref = 'ІС. 1:18';
      desc = 'Ваш скептицизм — це чесність. Запрошуємо до відкритого діалогу без тиску.';
    }
  }

  document.getElementById('resultType').innerHTML = type;
  document.getElementById('resultVerse').textContent = verse;
  document.getElementById('resultRef').textContent = ref;
  document.getElementById('resultDesc').textContent = desc;
}

document.getElementById('btnRestart').addEventListener('click', function() {
  showScreen('home');
});
</script>
</body>
</html>
