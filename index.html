<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE GOD TEST</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #222;
    position: sticky;
    top: 0;
    background: #000;
    z-index: 100;
  }
  .header-logo {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-logo span { color: #cc0000; }
  .header-back {
    font-size: 24px;
    cursor: pointer;
    color: #fff;
    background: none;
    border: none;
    display: none;
  }
  .header-icon {
    font-size: 20px;
    cursor: pointer;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ===== HOME SCREEN ===== */
  #screen-home {
    flex-direction: column;
  }

  .mosaic {
    width: 100%;
    height: 220px;
    background: #111;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 2px;
    overflow: hidden;
  }
  .mosaic-cell {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #444;
    overflow: hidden;
  }
  .mosaic-cell:nth-child(1)  { background: #1a0000; color: #cc0000; font-size: 22px; }
  .mosaic-cell:nth-child(3)  { background: #0a0a1a; color: #6666cc; font-size: 16px; }
  .mosaic-cell:nth-child(5)  { background: #001a00; color: #44aa44; font-size: 14px; }
  .mosaic-cell:nth-child(7)  { background: #1a1a00; color: #aaaa44; font-size: 20px; }
  .mosaic-cell:nth-child(9)  { background: #1a0a00; color: #cc6600; font-size: 18px; }
  .mosaic-cell:nth-child(11) { background: #0a1a1a; color: #44aaaa; font-size: 22px; }
  .mosaic-cell:nth-child(13) { background: #1a001a; color: #aa44aa; font-size: 16px; }
  .mosaic-cell:nth-child(2)  { font-size: 12px; color: #666; }
  .mosaic-cell:nth-child(4)  { font-size: 24px; color: #888; }
  .mosaic-cell:nth-child(6)  { font-size: 14px; color: #555; }
  .mosaic-cell:nth-child(8)  { font-size: 20px; color: #777; }
  .mosaic-cell:nth-child(10) { font-size: 16px; color: #666; }
  .mosaic-cell:nth-child(12) { font-size: 12px; color: #555; }
  .mosaic-cell:nth-child(14) { font-size: 22px; color: #888; }
  .mosaic-cell:nth-child(15) { font-size: 16px; color: #666; }

  .home-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 30px;
    text-align: center;
  }

  .home-title {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 8px;
  }
  .home-title span { color: #cc0000; }

  .home-reg { font-size: 14px; color: #888; margin-bottom: 20px; }

  .home-subtitle {
    font-size: 16px;
    color: #ccc;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .home-subtitle em {
    color: #cc0000;
    font-style: normal;
    font-weight: bold;
  }

  .home-desc {
    font-size: 13px;
    color: #666;
    margin-bottom: 50px;
    line-height: 1.5;
    max-width: 300px;
  }

  .btn-start {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: 18px 60px;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    width: 100%;
    max-width: 320px;
    transition: background 0.2s;
  }
  .btn-start:hover { background: #aa0000; }

  .home-footer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 1px solid #222;
  }
  .home-footer-item {
    padding: 24px 20px;
    text-align: center;
    border-right: 1px solid #222;
    cursor: pointer;
  }
  .home-footer-item:last-child { border-right: none; }
  .home-footer-item .label {
    font-size: 10px;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .home-footer-item .title {
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .home-footer-item .title span { color: #cc0000; }

  /* ===== QUESTION SCREEN ===== */
  #screen-question {
    flex-direction: column;
  }

  .question-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #222;
  }
  .q-label {
    font-size: 12px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .q-help {
    width: 20px;
    height: 20px;
    background: #cc0000;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
  }

  .progress-bar {
    height: 3px;
    background: #222;
  }
  .progress-fill {
    height: 100%;
    background: #cc0000;
    transition: width 0.4s ease;
  }

  .question-body {
    flex: 1;
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
  }

  .question-text {
    font-size: 28px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 30px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    padding: 4px 0;
  }
  .option input[type="radio"] { display: none; }
  .radio-custom {
    width: 22px;
    height: 22px;
    border: 2px solid #888;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  .radio-custom::after {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #cc0000;
    display: none;
  }
  .option input:checked + .radio-custom {
    border-color: #cc0000;
  }
  .option input:checked + .radio-custom::after {
    display: block;
  }
  .option-label {
    font-size: 18px;
    color: #ddd;
    letter-spacing: 0.5px;
  }

  .comment-area {
    width: 100%;
    background: #fff;
    color: #333;
    border: none;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 15px;
    resize: none;
    height: 90px;
    margin-bottom: 30px;
    font-family: Arial, sans-serif;
  }
  .comment-area::placeholder { color: #aaa; }

  .btn-next {
    background: none;
    border: none;
    color: #555;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    text-align: right;
    padding: 10px 0;
    transition: color 0.2s;
    align-self: flex-end;
  }
  .btn-next:hover { color: #888; }

  /* ===== RESULT SCREEN ===== */
  #screen-result {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 30px;
    text-align: center;
  }

  .result-icon {
    font-size: 60px;
    margin-bottom: 20px;
  }
  .result-title {
    font-size: 28px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .result-title span { color: #cc0000; }
  .result-profile {
    font-size: 20px;
    font-weight: bold;
    color: #cc0000;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .result-text {
    font-size: 15px;
    color: #bbb;
    line-height: 1.7;
    margin-bottom: 30px;
    max-width: 320px;
  }
  .result-verse {
    background: #111;
    border-left: 3px solid #cc0000;
    padding: 16px 20px;
    text-align: left;
    border-radius: 4px;
    margin-bottom: 30px;
    max-width: 320px;
  }
  .result-verse p {
    font-size: 14px;
    color: #ccc;
    line-height: 1.6;
    font-style: italic;
  }
  .result-verse cite {
    font-size: 12px;
    color: #cc0000;
    font-style: normal;
    display: block;
    margin-top: 8px;
  }
  .btn-restart {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    width: 100%;
    max-width: 320px;
  }
</style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div style="width:40px"></div>
    <div class="header-logo">THE<span>GOD</span>TEST<sup style="font-size:10px">®</sup></div>
    <div class="header-icon">🌐</div>
  </div>

  <div class="mosaic">
    <div class="mosaic-cell">✝</div>
    <div class="mosaic-cell">☯</div>
    <div class="mosaic-cell">✡</div>
    <div class="mosaic-cell">☪</div>
    <div class="mosaic-cell">☸</div>
    <div class="mosaic-cell">🕉</div>
    <div class="mosaic-cell">⚛</div>
    <div class="mosaic-cell">E=mc²</div>
    <div class="mosaic-cell">🧬</div>
    <div class="mosaic-cell">🌌</div>
    <div class="mosaic-cell">☦</div>
    <div class="mosaic-cell">🔯</div>
    <div class="mosaic-cell">☮</div>
    <div class="mosaic-cell">∞</div>
    <div class="mosaic-cell">?</div>
  </div>

  <div class="home-content">
    <div class="home-title">THE<span>GOD</span>TEST<sup style="font-size:20px">®</sup></div>
    <div class="home-subtitle">10 запитань. <em>Назавжди</em> жити з відповідями.</div>
    <div class="home-desc">Цей тест — не суперечка. Це простір для чесного діалогу про найважливіші питання життя.</div>
    <button class="btn-start" onclick="startTest()">РОЗПОЧАТИ ТЕСТ</button>
  </div>

  <div class="home-footer">
    <div class="home-footer-item">
      <div class="label">Завантажити</div>
      <div class="title">БОГ<br><span>НЕ</span><br>МЕРТВИЙ</div>
    </div>
    <div class="home-footer-item">
      <div class="label">Ресурси</div>
      <div class="title">THE<span>GOD</span>TEST<br>МАТЕРІАЛИ</div>
    </div>
  </div>
</div>

<!-- ===== QUESTION SCREEN ===== -->
<div id="screen-question" class="screen">
  <div class="header">
    <button class="header-back" id="btn-back" onclick="goBack()">‹</button>
    <div class="header-logo">THE<span>GOD</span>TEST<sup style="font-size:10px">®</sup></div>
    <div style="width:40px"></div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="question-body">
    <div class="q-label">
      ЗАПИТАННЯ <span id="q-number">1</span>
      <span class="q-help">?</span>
    </div>
    <br>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
    <textarea class="comment-area" id="q-comment" placeholder="Додаткові коментарі"></textarea>
    <button class="btn-next" onclick="nextQuestion()">ДАЛІ ›</button>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="screen-result" class="screen">
  <div class="header" style="width:100%; position:sticky; top:0; background:#000; z-index:100;">
    <div style="width:40px"></div>
    <div class="header-logo">THE<span>GOD</span>TEST<sup style="font-size:10px">®</sup></div>
    <div style="width:40px"></div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 30px; text-align:center;">
    <div class="result-icon">✝</div>
    <div class="result-title">ВАШ <span>ПРОФІЛЬ</span></div>
    <div class="result-profile" id="result-profile"></div>
    <div class="result-text" id="result-text"></div>
    <div class="result-verse" id="result-verse"></div>
    <button class="btn-restart" onclick="restartTest()">ПРОЙТИ ЗНОВУ</button>
  </div>
</div>

<script>
// ===== ДАНІ ПИТАНЬ =====
// Гілка визначається першим питанням
// q1: "Так" → теїст, "Ні" → скептик, "Не впевнений" → агностик

const questions_theist = [
  {
    text: "Ви вірите в Бога?",
    options: ["Так", "Ні", "Не впевнений(а)"]
  },
  {
    text: "Як би ви описали Бога?",
    options: ["Люблячий і особистий", "Вища сила / Енергія", "Справедливий суддя", "Байдужий до людей", "Свій варіант"]
  },
  {
    text: "Чого від нас очікує Бог?",
    options: ["Віри і довіри", "Добрих вчинків", "Дотримання правил", "Нічого особливого", "Свій варіант"]
  },
  {
    text: "Наскільки ви виконуєте те, чого очікує Бог?",
    options: ["Дуже добре", "Намагаюсь, але не завжди", "Погано", "Не знаю"]
  },
  {
    text: "Чи тільки одна релігія приводить до істини?",
    options: ["Так, лише одна", "Всі ведуть до Бога", "Не знаю", "Свій варіант"]
  },
  {
    text: "Ви вірите в існування раю?",
    options: ["Так", "Ні", "Не впевнений(а)"]
  },
  {
    text: "Чи кожна людина потрапить до раю?",
    options: ["Так, всі", "Лише добрі люди", "Лише ті, хто вірить", "Ні", "Не знаю"]
  },
  {
    text: "Ви потрапите до раю?",
    options: ["Так, впевнений(а)", "Сподіваюсь", "Не знаю", "Ні"]
  },
  {
    text: "Чому ви так вважаєте?",
    options: ["Я живу добре", "Я вірю в Ісуса Христа", "Бог милосердний", "Не знаю", "Свій варіант"]
  },
  {
    text: "Чи хочете ви дізнатись, що Біблія говорить про це?",
    options: ["Так, цікаво", "Можливо", "Ні, дякую"]
  }
];

const questions_skeptic = [
  {
    text: "Ви вірите в Бога?",
    options: ["Так", "Ні", "Не впевнений(а)"]
  },
  {
    text: "Що найбільше заважає вам вірити в Бога?",
    options: ["Наука пояснює все", "Існування зла і страждань", "Немає доказів", "Забагато релігій", "Свій варіант"]
  },
  {
    text: "Чому існує щось, а не ніщо?",
    options: ["Всесвіт існував завжди", "Виник сам по собі", "Фізичні закони", "Не знаю", "Свій варіант"]
  },
  {
    text: "Чи бачите ви сенс або мету у Всесвіті?",
    options: ["Так", "Ні", "Не впевнений(а)"]
  },
  {
    text: "Звідки взялося перше живе?",
    options: ["Випадковість", "Закони природи", "Позаземне походження", "Не знаю", "Свій варіант"]
  },
  {
    text: "Чи існує об'єктивне зло?",
    options: ["Так, воно реальне", "Ні, це суб'єктивно", "Не впевнений(а)"]
  },
  {
    text: "На чому базується ваша мораль?",
    options: ["Суспільні норми", "Еволюція", "Особисті почуття", "Розум", "Свій варіант"]
  },
  {
    text: "Чи є людське життя особливим порівняно з іншим?",
    options: ["Так, однозначно", "Ні, ми просто тварини", "Не впевнений(а)"]
  },
  {
    text: "Наскільки ви впевнені, що Бога не існує?",
    options: ["Абсолютно впевнений(а)", "Досить впевнений(а)", "Скоріше ні, ніж так", "Не знаю"]
  },
  {
    text: "Чи хочете ви почути аргументи на користь існування Бога?",
    options: ["Так, цікаво", "Можливо", "Ні, дякую"]
  }
];

// ===== СТАН =====
let currentQuestions = [];
let currentIndex = 0;
let answers = [];
let branch = "unknown";

function startTest() {
  currentIndex = 0;
  answers = [];
  currentQuestions = questions_theist; // Перше питання однакове
  showScreen("screen-question");
  document.getElementById("btn-back").style.display = "block";
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;

  document.getElementById("q-number").textContent = currentIndex + 1;
  document.getElementById("q-text").textContent = q.text;
  document.getElementById("q-comment").value = "";

  // Прогрес
  const pct = ((currentIndex) / total) * 100;
  document.getElementById("progress-fill").style.width = pct + "%";

  // Опції
  const container = document.getElementById("q-options");
  container.innerHTML = "";
  q.options.forEach((opt, i) => {
    const label = document.createElement("label");
    label.className = "option";
    label.innerHTML = `
      <input type="radio" name="q-option" value="${i}">
      <div class="radio-custom"></div>
      <span class="option-label">${opt}</span>
    `;
    container.appendChild(label);
  });
}

function nextQuestion() {
  const selected = document.querySelector('input[name="q-option"]:checked');
  const comment = document.getElementById("q-comment").value;

  const answer = {
    question: currentQuestions[currentIndex].text,
    answer: selected ? currentQuestions[currentIndex].options[selected.value] : null,
    comment: comment
  };
  answers.push(answer);

  // Після першого питання — визначаємо гілку
  if (currentIndex === 0) {
    const val = selected ? parseInt(selected.value) : 0;
    if (val === 1) {
      // "Ні" → скептик
      branch = "skeptic";
      currentQuestions = questions_skeptic;
      currentQuestions[0] = questions_theist[0]; // Перше питання вже відповіли
    } else {
      branch = "theist";
      currentQuestions = questions_theist;
    }
  }

  currentIndex++;

  if (currentIndex >= currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function goBack() {
  if (currentIndex > 0) {
    currentIndex--;
    answers.pop();
    renderQuestion();
  } else {
    showScreen("screen-home");
  }
}

function showResult() {
  showScreen("screen-result");

  let profile = "";
  let text = "";
  let verse = "";

  // Аналіз відповідей
  const lastAnswer = answers[answers.length - 1];
  const wantsMore = lastAnswer && (lastAnswer.answer === "Так, цікаво" || lastAnswer.answer === "Можливо");

  if (branch === "skeptic") {
    profile = "ШУКАЧ ІСТИНИ";
    text = "Ви ставите важливі питання. Це сміливо. Багато великих мислителів починали саме з сумніву — і знаходили відповіді там, де не очікували.";
    verse = `<p>"Шукайте — і знайдете; стукайте — і відчинять вам."</p><cite>— Матвія 7:7</cite>`;
  } else {
    // Перевіряємо відповідь на питання "Чому потрапите до раю?"
    const q9 = answers[8];
    if (q9 && q9.answer === "Я вірю в Ісуса Христа") {
      profile = "ВПЕВНЕНИЙ У ВІРІ";
      text = "Ваша відповідь показує, що ви розумієте суть Євангелія. Спасіння — це не нагорода за добрі вчинки, а дар через віру в Ісуса Христа.";
      verse = `<p>"Бо так полюбив Бог світ, що дав Сина Свого Єдинородного, щоб кожен, хто вірує в Нього, не загинув, але мав вічне життя."</p><cite>— Івана 3:16</cite>`;
    } else {
      profile = "ДУХОВНИЙ МАНДРІВНИК";
      text = "Ви вірите в Бога і намагаєтесь жити добре. Але Біблія говорить, що стосунки з Богом — це не про досягнення, а про довіру. Є одна відповідь, яка змінює все.";
      verse = `<p>"Бо благодаттю ви спасені через віру, і це не від вас — це дар Божий, не від діл, щоб ніхто не хвалився."</p><cite>— Ефесян 2:8-9</cite>`;
    }
  }

  document.getElementById("result-profile").textContent = profile;
  document.getElementById("result-text").textContent = text;
  document.getElementById("result-verse").innerHTML = verse;
}

function restartTest() {
  showScreen("screen-home");
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
