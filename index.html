<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест про Бога</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0c29;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  /* SPLASH */
  #splash {
    text-align: center;
    padding: 40px 20px;
  }
  .splash-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  .splash-title {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .splash-title span { color: #f9c74f; }
  .splash-sub {
    font-size: 15px;
    color: #aaa;
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .btn-start {
    background: linear-gradient(135deg, #f9c74f, #f3722c);
    color: #000;
    border: none;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(249,199,79,0.4);
  }
  .btn-start:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(249,199,79,0.6); }

  /* CARD */
  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 28px 24px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    height: 6px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #f9c74f, #f3722c);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .q-counter {
    font-size: 12px;
    color: #f9c74f;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .q-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 24px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 15px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.3;
  }
  .option-btn:hover { background: rgba(249,199,79,0.15); border-color: #f9c74f; }
  .option-btn.selected { background: rgba(249,199,79,0.25); border-color: #f9c74f; color: #f9c74f; font-weight: 600; }

  .custom-input {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 15px;
    width: 100%;
    margin-top: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .custom-input:focus { border-color: #f9c74f; }
  .custom-input::placeholder { color: #888; }

  /* SCALE */
  .scale-wrap { margin: 8px 0 16px; }
  .scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 6px; }
  input[type=range] {
    width: 100%;
    accent-color: #f9c74f;
    height: 6px;
    cursor: pointer;
  }
  .scale-value {
    text-align: center;
    font-size: 32px;
    font-weight: 900;
    color: #f9c74f;
    margin-top: 8px;
  }

  /* NOTES */
  .notes-label {
    font-size: 12px;
    color: #888;
    margin-top: 20px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .notes-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    width: 100%;
    min-height: 70px;
    resize: vertical;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .notes-input:focus { border-color: rgba(249,199,79,0.4); }
  .notes-input::placeholder { color: #555; }

  .btn-next {
    background: linear-gradient(135deg, #f9c74f, #f3722c);
    color: #000;
    border: none;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn-next:hover { transform: scale(1.02); }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* RESULT */
  #result { display: none; }
  .result-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .result-subtitle { font-size: 14px; color: #aaa; line-height: 1.5; }

  .result-summary {
    background: rgba(249,199,79,0.1);
    border: 1px solid rgba(249,199,79,0.3);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 20px;
    font-size: 15px;
    line-height: 1.6;
  }

  .answers-section { margin-bottom: 20px; }
  .answers-title {
    font-size: 13px;
    color: #f9c74f;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .answer-item {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 3px solid rgba(249,199,79,0.5);
  }
  .answer-q { font-size: 12px; color: #888; margin-bottom: 4px; }
  .answer-a { font-size: 14px; font-weight: 600; color: #f9c74f; margin-bottom: 6px; }
  .answer-comment { font-size: 13px; color: #ccc; line-height: 1.5; }

  .invite-box {
    background: linear-gradient(135deg, rgba(249,199,79,0.15), rgba(243,114,44,0.15));
    border: 1px solid rgba(249,199,79,0.4);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .invite-box h3 { font-size: 17px; margin-bottom: 8px; }
  .invite-box p { font-size: 14px; color: #ccc; line-height: 1.5; }

  /* CONTACT FORM */
  .contact-form {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .contact-form h3 { font-size: 16px; margin-bottom: 6px; }
  .contact-form p { font-size: 13px; color: #aaa; margin-bottom: 16px; line-height: 1.4; }
  .form-field { margin-bottom: 12px; }
  .form-field label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .form-field input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-field input:focus { border-color: #f9c74f; }
  .form-field input::placeholder { color: #555; }
  .btn-submit {
    background: linear-gradient(135deg, #f9c74f, #f3722c);
    color: #000;
    border: none;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    transition: transform 0.2s;
  }
  .btn-submit:hover { transform: scale(1.02); }

  .btn-restart {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 13px;
    font-size: 15px;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: rgba(255,255,255,0.15); }

  .hidden { display: none !important; }
  .screen { display: none; }
  .screen.active { display: block; }
</style>
</head>
<body>
<div class="container">

  <!-- SPLASH -->
  <div id="screen-splash" class="screen active">
    <div id="splash">
      <div class="splash-icon">✦</div>
      <div class="splash-title">ТЕСТ<br>про <span>БОГА</span></div>
      <div class="splash-sub">Кілька чесних запитань про найважливіше.<br>Без правильних чи неправильних відповідей.</div>
      <button class="btn-start" onclick="startTest()">Почати тест →</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="card">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:10%"></div>
      </div>
      <div class="q-counter" id="q-counter">Питання 1 з 10</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options-wrap"></div>
      <div class="notes-label">📝 Нотатки (необов'язково)</div>
      <textarea class="notes-input" id="notes-input" placeholder="Запишіть думки, що виникли..."></textarea>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>Далі →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="card" id="result-card"></div>
  </div>

</div>

<script>
// ============================================================
// DATA
// ============================================================

const questionsBeliever = [
  {
    q: "Як би ви описали Бога?",
    type: "choice",
    options: ["Люблячий", "Святий", "Безособистісна Енергія", "Байдужий"],
    custom: true
  },
  {
    q: "Чого від нас очікує Бог?",
    type: "choice",
    options: ["Вірити в Нього", "Не шкодити іншим", "Дотримуватись правил", "Нічого"],
    custom: true
  },
  {
    q: "Як ви задовольняєте Його вимоги?",
    type: "scale",
    label: "Оцініть себе від 1 (зовсім ні) до 10 (повністю)",
    scaleMin: "1 — зовсім ні",
    scaleMax: "10 — повністю"
  },
  {
    q: "Чи тільки одна релігія приводить до правдивого Бога?",
    type: "choice",
    options: ["Так", "Ні", "Не впевнений"]
  },
  {
    q: "Чи вірите ви у Небеса (Рай)?",
    type: "choice",
    options: ["Так", "Ні", "Вірю в реінкарнацію", "Не впевнений"]
  },
  {
    q: "Чи кожен потрапить туди?",
    type: "choice",
    options: ["Так", "Ні", "Не впевнений", "Раю не існує"]
  },
  {
    q: "Чи ви потрапите на небеса?",
    type: "choice",
    options: ["Так", "Ні", "Не впевнений", "Раю не існує"]
  },
  {
    q: "Чому ви потрапите туди або чому ні?",
    type: "choice",
    options: ["Так, усі туди потраплять", "Так, я хороша людина", "Так, Бог спас мене", "Ні, бо не достатньо хороший", "Раю не існує"]
  },
  {
    q: "Чи ви б хотіли знати, як на ці питання відповідає Біблія?",
    type: "choice",
    options: ["Знаю і погоджуюсь", "Знаю і не погоджуюсь", "Не цікаво", "Хотів би довідатись"],
    isFinal: true
  }
];

const questionsSkeptic = [
  {
    q: "Назвіть основні причини, з яких ви не вірите в Бога",
    type: "choice",
    options: ["Протиріччя з наукою", "Зло і страждання", "Брак доказів", "Багато релігій"],
    custom: true
  },
  {
    q: "Чому взагалі щось існує, а не просто нічого?",
    type: "choice",
    options: ["Завжди існувало", "Створило само себе", "Закони фізики", "Не маю поняття"],
    custom: true
  },
  {
    q: "Чи має Всесвіт якийсь сенс або мету?",
    type: "choice",
    options: ["Так", "Ні", "Не впевнений"]
  },
  {
    q: "Звідки взялось життя на Землі?",
    type: "choice",
    options: ["Випадковість", "Закони природи", "Позаземне походження", "Не впевнений"],
    custom: true
  },
  {
    q: "Чи існує зло?",
    type: "choice",
    options: ["Так", "Ні", "Не впевнений"]
  },
  {
    q: "На чому базується ваша моральність?",
    type: "choice",
    options: ["Ні на чому", "Соціальні норми", "Еволюція", "Почуття"],
    custom: true
  },
  {
    q: "Чи людське життя є особливішим за життя рослин чи тварин?",
    type: "choice",
    options: ["Так", "Ні", "Не впевнений"]
  },
  {
    q: "На скільки ви переконані, що Бога не існує?",
    type: "scale",
    label: "Оцініть від 1 (майже не впевнений) до 10 (абсолютно впевнений)",
    scaleMin: "1 — майже ні",
    scaleMax: "10 — абсолютно"
  },
  {
    q: "Чи хотіли б ви почути, як теїсти відповідають на ці запитання?",
    type: "choice",
    options: ["Так", "Ні"],
    isFinal: true
  }
];

// ============================================================
// THEIST COMMENTS (for skeptic branch, final=Так)
// ============================================================
const theistComments = [
  { q: "Причини невіри", comments: {
    "Протиріччя з наукою": "Більшість засновників сучасної науки (Ньютон, Кеплер, Пастер) були глибоко віруючими. Наука чудово відповідає на «як», але питання «навіщо» залишається за її межами.",
    "Зло і страждання": "Існування зла парадоксально підтверджує мораль — адже ми розуміємо, що щось «не так». А мораль вимагає об'єктивного стандарту, який може дати лише Бог.",
    "Брак доказів": "Всесвіт, що почався з нічого, виникнення свідомості, об'єктивна мораль — все це потужні аргументи на користь Творця, якщо бути відкритим до них.",
    "Багато релігій": "Різноманіття не спростовує істину. Є багато валют, але золото — одне. Питання в тому, яка з релігій відповідає реальності."
  }},
  { q: "Чому щось існує", comments: {
    "Завжди існувало": "Але сучасна наука (Великий Вибух) показує, що Всесвіт мав початок. Те, що має початок, потребує причини.",
    "Створило само себе": "Щоб створити себе, треба спочатку існувати — це логічне протиріччя. Теїсти кажуть: причина Всесвіту поза ним.",
    "Закони фізики": "Але самі закони фізики — звідки вони? Хто або що їх «встановило»?",
    "Не маю поняття": "Чесна відповідь. Теїсти пропонують: Бог — найбільш логічне пояснення того, чому взагалі щось є."
  }},
  { q: "Сенс Всесвіту", comments: {
    "Так": "Цікаво! Якщо є сенс — звідки він береться? Теїсти кажуть: об'єктивний сенс можливий лише якщо є Той, хто його вклав.",
    "Ні": "Якщо немає сенсу — чому ми так наполегливо його шукаємо? Може, сама ця спрага є підказкою?",
    "Не впевнений": "Більшість людей відчувають, що їхнє життя має значення. Теїзм пояснює це краще, ніж матеріалізм."
  }},
  { q: "Походження життя", comments: {
    "Випадковість": "Ймовірність випадкового виникнення навіть найпростішої клітини настільки мала, що вчені самі називають це «практично неможливим».",
    "Закони природи": "Але самі закони природи налаштовані з неймовірною точністю для існування життя. Хто налаштував їх?",
    "Позаземне походження": "Це лише переносить питання далі: а там звідки? Теїсти пропонують першопричину.",
    "Не впевнений": "Чесно. Розумний задум — одна з серйозних наукових гіпотез, яку варто розглянути."
  }},
  { q: "Існування зла", comments: {
    "Так": "Якщо зло існує — існує і добро як стандарт. Стандарт вимагає Законодавця. Це аргумент на користь Бога.",
    "Ні": "Але тоді Голокост — не зло, а просто «інший вибір». Більшість людей відчувають, що це неправда.",
    "Не впевнений": "Наша інтуїція підказує нам, що деякі речі справді погані. Звідки ця інтуїція?"
  }},
  { q: "Моральність", comments: {
    "Ні на чому": "Але ви все одно маєте моральні судження — «це несправедливо», «це жорстоко». Звідки вони?",
    "Соціальні норми": "Якщо мораль — лише соціум, то нацистська Німеччина була «морально правою» за своїми нормами. Але ми знаємо, що це не так.",
    "Еволюція": "Еволюція пояснює, чому ми маємо моральні почуття, але не чому деякі речі об'єктивно правильні чи неправильні.",
    "Почуття": "Почуття різних людей суперечать одне одному. Потрібен об'єктивний стандарт поза нами."
  }},
  { q: "Особливість людського життя", comments: {
    "Так": "Цікаво! Якщо людина особлива — чому? Теїсти кажуть: тому що ми створені за образом Бога.",
    "Ні": "Але тоді вбивство людини не гірше за вбивство комара. Більшість людей відчувають, що це неправда.",
    "Не впевнений": "Наша інтуїція підказує, що людське життя має особливу цінність. Теїзм дає цьому пояснення."
  }}
];

// ============================================================
// BIBLE COMMENTS (for believer branch, final=Хотів би довідатись)
// ============================================================
const bibleComments = [
  { q: "Як Біблія описує Бога", comments: {
    "Люблячий": "«Бог є любов» (1 Ів. 4:8). Але ця любов не сентиментальна — вона свята і жертовна. Саме тому Бог послав Сина.",
    "Святий": "«Святий, святий, святий Господь» (Іс. 6:3). Святість Бога — ось чому гріх — серйозна проблема, яка потребує вирішення.",
    "Безособистісна Енергія": "Біблія описує Бога як особистість: Він говорить, любить, страждає, діє в історії. Це не сила — це Отець.",
    "Байдужий": "«Бо так Бог полюбив світ, що дав Сина Свого Єдинородного» (Ів. 3:16). Байдужий Бог не йде на хрест."
  }},
  { q: "Чого очікує Бог", comments: {
    "Вірити в Нього": "Так! «Хто вірує в Сина, має вічне життя» (Ів. 3:36). Але Біблія додає: ця віра виявляється в любові до Бога і ближнього.",

    "Ні, бо не достатньо хороший": "Ніхто не достатньо хороший — і саме тому Христос помер. «Христос помер за нас, коли ми ще були грішниками» (Рим. 5:8).",

// ============================================================
// STATE
// ============================================================
let branch = null; // 'believer' | 'skeptic'
let currentQ = 0;
let questions = [];
let answers = [];
let notes = [];

// ============================================================
// INIT
// ============================================================
function startTest() {
  showScreen('screen-quiz');
  renderFirstQuestion();
}

function renderFirstQuestion() {
  const card = document.querySelector('#screen-quiz .card');
  card.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:10%"></div></div>
    <div class="q-counter">Питання 1</div>
    <div class="q-text">Чи вірите ви в Бога?</div>
    <div class="options">
      <button class="option-btn" onclick="chooseBranch('believer', this)">Так</button>
      <button class="option-btn" onclick="chooseBranch('skeptic', this)">Ні</button>
    </div>
    <div class="notes-label">📝 Нотатки (необов'язково)</div>
    <textarea class="notes-input" id="notes-input-0" placeholder="Запишіть думки, що виникли..."></textarea>
  `;
}

function chooseBranch(b, btn) {
  branch = b;
  questions = b === 'believer' ? questionsBeliever : questionsSkeptic;
  answers = new Array(questions.length).fill(null);
  notes = new Array(questions.length + 1).fill('');
  
  // save note from q0
  notes[0] = document.getElementById('notes-input-0').value;
  answers[-1] = b === 'believer' ? 'Так' : 'Ні';
  
  // highlight
  document.querySelectorAll('.option-btn').forEach(x => x.classList.remove('selected'));
  btn.classList.add('selected');
  
  currentQ = 0;
  setTimeout(() => renderQuestion(), 300);
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length + 1;
  const progress = Math.round(((currentQ + 2) / (total + 1)) * 100);

  let optionsHTML = '';
  
  if (q.type === 'choice') {
    q.options.forEach((opt, i) => {
      optionsHTML += `<button class="option-btn" onclick="selectOption(this, '${escapeQ(opt)}')">${opt}</button>`;
    });
    if (q.custom) {
      optionsHTML += `<input type="text" class="custom-input" id="custom-input" placeholder="Ваш варіант..." oninput="selectCustom(this)">`;
    }
  } else if (q.type === 'scale') {
    optionsHTML = `
      <div class="scale-wrap">
        <div class="scale-labels"><span>${q.scaleMin}</span><span>${q.scaleMax}</span></div>
        <input type="range" min="1" max="10" value="5" id="scale-input" oninput="updateScale(this)">
        <div class="scale-value" id="scale-val">5</div>
      </div>
    `;
  }

  const card = document.querySelector('#screen-quiz .card');
  card.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:${progress}%"></div></div>
    <div class="q-counter">Питання ${currentQ + 2} з ${total}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="options-wrap">${optionsHTML}</div>
    <div class="notes-label">📝 Нотатки (необов'язково)</div>
    <textarea class="notes-input" id="notes-input" placeholder="Запишіть думки, що виникли...">${notes[currentQ + 1] || ''}</textarea>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()" ${q.type === 'scale' ? '' : 'disabled'}>
      ${currentQ === questions.length - 1 ? 'Переглянути результат ✦' : 'Далі →'}
    </button>
  `;
  
  // restore answer if going back
  if (answers[currentQ] !== null) {
    if (q.type === 'choice') {
      document.querySelectorAll('.option-btn').forEach(btn => {
        if (btn.textContent === answers[currentQ]) btn.classList.add('selected');
      });
      document.getElementById('btn-next').disabled = false;
    }
  }
}

function escapeQ(s) {
  return s.replace(/'/g, "\'");
}

function selectOption(btn, val) {
  document.querySelectorAll('#options-wrap .option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[currentQ] = val;
  document.getElementById('btn-next').disabled = false;
}

function selectCustom(input) {
  if (input.value.trim()) {
    document.querySelectorAll('#options-wrap .option-btn').forEach(b => b.classList.remove('selected'));
    answers[currentQ] = input.value.trim();
    document.getElementById('btn-next').disabled = false;
  }
}

function updateScale(input) {
  document.getElementById('scale-val').textContent = input.value;
  answers[currentQ] = input.value;
}

function nextQuestion() {
  notes[currentQ + 1] = document.getElementById('notes-input').value;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

// ============================================================
// RESULT
// ============================================================
function showResult() {
  showScreen('screen-result');
  const card = document.getElementById('result-card');
  const finalAnswer = answers[questions.length - 1];
  
  let html = '';

  if (branch === 'skeptic') {
    html = buildSkepticResult(finalAnswer);
  } else {
    html = buildBelieverResult(finalAnswer);
  }

  card.innerHTML = html;
}

function buildSkepticResult(finalAnswer) {
  const wantsTheist = finalAnswer === 'Так';
  
  let summary = generateSkepticSummary();
  
  let html = `
    <div class="result-header">
      <div class="result-emoji">🔍</div>
      <div class="result-title">Ваш результат</div>
      <div class="result-subtitle">Дякуємо за чесність. Ось короткий підсумок вашого погляду на світ.</div>
    </div>
    <div class="result-summary">${summary}</div>
  `;

  if (wantsTheist) {
    html += `
      <div class="answers-section">
        <div class="answers-title">💬 Як теїсти відповідають на ці питання</div>
    `;
    
    const qLabels = [
      "Причини невіри",
      "Чому щось існує",
      "Сенс Всесвіту",
      "Походження життя",
      "Існування зла",
      "Моральність",
      "Особливість людського життя"
    ];
    
    for (let i = 0; i < 7; i++) {
      const ans = answers[i];
      const commentObj = theistComments[i];
      if (!commentObj) continue;
      const comment = commentObj.comments[ans] || commentObj.comments[Object.keys(commentObj.comments)[0]];
      if (comment) {
        html += `
          <div class="answer-item">
            <div class="answer-q">${qLabels[i]}</div>
            <div class="answer-a">Ваша відповідь: ${ans || '—'}</div>
            <div class="answer-comment">${comment}</div>
          </div>
        `;
      }
    }
    html += `</div>`;
  }

  html += `
    <button class="btn-restart" onclick="restartTest()">↩ Пройти ще раз</button>
  `;
  
  return html;
}

function generateSkepticSummary() {
  const reason = answers[0];
  const meaning = answers[2];
  const evil = answers[4];
  const special = answers[6];
  const certainty = answers[7];
  
  let text = `Ви не вірите в Бога`;
  if (reason) text += `, і однією з причин є: "${reason}"`;
  text += `. `;
  
  if (meaning === 'Так') text += `При цьому ви відчуваєте, що Всесвіт має якийсь сенс. `;
  else if (meaning === 'Ні') text += `Ви вважаєте, що Всесвіт не має об'єктивного сенсу. `;
  
  if (evil === 'Так') text += `Ви визнаєте існування зла — а це глибше, ніж здається. `;
  
  if (certainty) text += `Ваша впевненість у відсутності Бога — ${certainty}/10. `;
  
  if (parseInt(certainty) < 8) text += `Це означає, що питання ще відкрите. Можливо, варто дослідити його глибше.`;
  
  return text;
}

function buildBelieverResult(finalAnswer) {
  let summary = generateBelieverSummary();
  let html = `
    <div class="result-header">
      <div class="result-emoji">✦</div>
      <div class="result-title">Ваш результат</div>
      <div class="result-subtitle">Дякуємо за відкритість. Ось підсумок вашого духовного погляду.</div>
    </div>
    <div class="result-summary">${summary}</div>
  `;

  if (finalAnswer === 'Знаю і погоджуюсь' || finalAnswer === 'Знаю і не погоджуюсь') {
    html += `
      <div class="invite-box">
        <h3>🏛️ Запрошення</h3>
        <p>Ми запрошуємо вас на наше богослужіння — місце, де можна глибше досліджувати ці питання разом з іншими.</p>
      </div>
    `;
  }

  if (finalAnswer === 'Хотів би довідатись') {
    html += `
      <div class="answers-section">
        <div class="answers-title">📖 Що каже Біблія</div>
    `;
    
    const qLabels = [
      "Як Біблія описує Бога",
      "Чого очікує Бог",
      "Виконання вимог",
      "Одна релігія",
      "Небеса",
      "Чи кожен потрапить",
      "Чи ви потрапите",
      "Чому потрапите або ні"
    ];
    
    for (let i = 0; i < 8; i++) {
      const ans = answers[i];
      const commentObj = bibleComments[i];
      if (!commentObj) continue;
      let comment;
      if (commentObj.comments['scale']) {
        comment = commentObj.comments['scale'];
      } else {
        comment = commentObj.comments[ans];
      }
      if (comment) {
        html += `
          <div class="answer-item">
            <div class="answer-q">${qLabels[i]}</div>
            <div class="answer-a">Ваша відповідь: ${ans || '—'}</div>
            <div class="answer-comment">${comment}</div>
          </div>
        `;
      }
    }
    html += `</div>`;

    html += `
      <div class="contact-form">
        <h3>📬 Хочете дізнатись більше?</h3>
        <p>Залиште свої контакти — ми зв'яжемось і запросимо на особисте або групове вивчення Біблії.</p>
        <div class="form-field">
          <label>Ім'я</label>
          <input type="text" id="cf-name" placeholder="Ваше ім'я">
        </div>
        <div class="form-field">
          <label>Телефон або Telegram</label>
          <input type="text" id="cf-phone" placeholder="+380... або @username">
        </div>
        <div class="form-field">
          <label>Email (необов'язково)</label>
          <input type="email" id="cf-email" placeholder="your@email.com">
        </div>
        <button class="btn-submit" onclick="submitContact()">Надіслати →</button>
      </div>
    `;
  }

  html += `<button class="btn-restart" onclick="restartTest()">↩ Пройти ще раз</button>`;
  return html;
}

function generateBelieverSummary() {
  const godDesc = answers[0];
  const expectation = answers[1];
  const scale = answers[2];
  const heaven = answers[4];
  const willGo = answers[6];
  
  let text = `Ви вірите в Бога`;
  if (godDesc) text += ` і описуєте Його як "${godDesc}"`;
  text += `. `;
  
  if (expectation) text += `На вашу думку, Бог очікує від нас: "${expectation}". `;
  if (scale) text += `Ви оцінюєте своє виконання Його вимог на ${scale}/10. `;
  
  if (heaven === 'Так') {
    text += `Ви вірите в небеса `;
    if (willGo === 'Так') text += `і впевнені, що потрапите туди. `;
    else if (willGo === 'Не впевнений') text += `але не впевнені щодо себе особисто. `;
    else text += `. `;
  }
  
  return text;
}

function submitContact() {
  const name = document.getElementById('cf-name').value.trim();
  const phone = document.getElementById('cf-phone').value.trim();
  const email = document.getElementById('cf-email').value.trim();
  
  if (!name || !phone) {
    alert('Будь ласка, вкажіть ім'я та телефон/Telegram');
    return;
  }
  
  // In real deployment, this would send to a server
  // For now, show confirmation
  const form = document.querySelector('.contact-form');
  form.innerHTML = `
    <div style="text-align:center; padding: 20px 0;">
      <div style="font-size:40px; margin-bottom:12px;">🙏</div>
      <div style="font-size:17px; font-weight:700; margin-bottom:8px;">Дякуємо, ${name}!</div>
      <div style="font-size:14px; color:#aaa; line-height:1.5;">Ми зв'яжемось з вами найближчим часом і розповімо про можливості вивчення Біблії.</div>
    </div>
  `;
}

function restartTest() {
  branch = null;
  currentQ = 0;
  questions = [];
  answers = [];
  notes = [];
  showScreen('screen-splash');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
</script>
