<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ТеоТест</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Arial', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ========== SCREENS ========== */
  .screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
  }
  .screen.active { display: flex; }

  /* ========== HOME SCREEN ========== */
  #home {
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 0;
  }

  .home-mosaic {
    width: 100%;
    height: 30dvh;
    background: linear-gradient(135deg,
      #1a1a1a 0%, #2a2a2a 10%, #1a1a1a 20%,
      #222 30%, #333 40%, #222 50%,
      #1a1a1a 60%, #2a2a2a 70%, #1a1a1a 80%,
      #222 90%, #1a1a1a 100%);
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .mosaic-cell {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #444;
    overflow: hidden;
  }

  .mosaic-symbols {
    display: contents;
  }

  .home-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 16px;
    width: 100%;
  }

  .home-logo {
    font-size: clamp(42px, 14vw, 72px);
    font-weight: 100;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.1;
    width: 95%;
  }

  .home-logo span { color: #cc0000; }

  .home-tagline {
    font-size: clamp(13px, 3.5vw, 16px);
    color: #aaa;
    text-align: center;
    font-weight: 300;
  }

  .home-tagline span { color: #cc0000; }

  .btn-start {
    background: #cc0000;
    color: #fff;
    border: none;
    width: 90%;
    padding: 18px;
    font-size: clamp(16px, 4.5vw, 20px);
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 8px;
  }

  .home-bottom {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 1px solid #222;
    flex-shrink: 0;
  }

  .home-bottom-block {
    padding: 16px;
    font-size: clamp(11px, 3vw, 13px);
    font-weight: 700;
    color: #fff;
    border-right: 1px solid #222;
    line-height: 1.4;
  }

  .home-bottom-block:last-child { border-right: none; color: #888; }
  .home-bottom-block .red { color: #cc0000; }

  /* ========== QUESTION SCREEN ========== */
  #question-screen {
    flex-direction: column;
    height: 100dvh;
  }

  .q-header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px 6px;
    position: relative;
    flex-shrink: 0;
  }

  .q-back {
    position: absolute;
    left: 16px;
    background: none;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .q-title {
    font-size: clamp(13px, 3.5vw, 16px);
    font-weight: 300;
    letter-spacing: 2px;
  }

  .q-title span { color: #cc0000; }

  .q-progress-bar {
    height: 3px;
    background: #222;
    flex-shrink: 0;
  }

  .q-progress-fill {
    height: 100%;
    background: #cc0000;
    transition: width 0.3s ease;
  }

  .q-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px 20px 6px;
    overflow: hidden;
  }

  .q-label-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .q-label {
    font-size: clamp(15px, 4.5vw, 20px);
    font-weight: 300;
    letter-spacing: 4px;
    color: #aaa;
    text-align: center;
  }

  .q-hint-btn {
    width: 26px;
    height: 26px;
    background: #cc0000;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .q-text {
    font-size: clamp(20px, 6vw, 28px);
    font-weight: 300;
    line-height: 1.25;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .q-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .q-option {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    padding: 2px 0;
  }

  .q-option input[type="radio"] { display: none; }

  .q-radio {
    width: 20px;
    height: 20px;
    border: 2px solid #666;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }

  .q-option input[type="radio"]:checked + .q-radio {
    border-color: #fff;
  }

  .q-option input[type="radio"]:checked + .q-radio::after {
    content: '';
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
  }

  .q-option-label {
    font-size: clamp(15px, 4.5vw, 19px);
    font-weight: 300;
  }

  /* Scale 1-10 */
  .q-scale {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .scale-btn {
    flex: 1;
    min-width: 28px;
    padding: 10px 4px;
    background: #1a1a1a;
    border: 1px solid #444;
    color: #fff;
    font-size: clamp(14px, 4vw, 18px);
    cursor: pointer;
    border-radius: 4px;
    text-align: center;
    transition: background 0.2s;
  }

  .scale-btn.selected {
    background: #cc0000;
    border-color: #cc0000;
  }

  /* Custom input */
  .q-custom-input {
    display: none;
    margin-top: 6px;
  }

  .q-custom-input.visible { display: block; }

  .q-custom-input input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #444;
    color: #fff;
    padding: 10px 12px;
    font-size: clamp(14px, 4vw, 16px);
    border-radius: 4px;
    outline: none;
  }

  .q-notes {
    flex: 1;
    margin-top: 8px;
    min-height: 0;
  }

  .q-notes textarea {
    width: 100%;
    height: 100%;
    min-height: 50px;
    max-height: 90px;
    background: #fff;
    color: #333;
    border: none;
    padding: 10px 12px;
    font-size: clamp(13px, 3.5vw, 15px);
    border-radius: 6px;
    resize: none;
    outline: none;
    font-family: Arial, sans-serif;
  }

  .q-notes textarea::placeholder { color: #999; }

  /* ========== NEXT BUTTON ========== */
  .btn-next {
    background: none;
    border: none;
    color: #333;
    font-size: clamp(36px, 12vw, 56px);
    font-weight: 300;
    letter-spacing: 6px;
    cursor: pointer;
    width: 100%;
    text-align: center;
    padding: 10px 0 14px;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .btn-next:hover { color: #555; }

  /* ========== HINT OVERLAY ========== */
  .hint-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }

  .hint-overlay.visible { display: flex; }

  .hint-box {
    background: #1a1a1a;
    border: 1px solid #cc0000;
    border-radius: 10px;
    padding: 24px 20px;
    max-width: 360px;
    width: 100%;
    position: relative;
  }

  .hint-box h3 {
    color: #cc0000;
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 12px;
    font-weight: 400;
  }

  .hint-box p {
    font-size: 15px;
    line-height: 1.6;
    color: #ddd;
    font-weight: 300;
  }

  .hint-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: #888;
    font-size: 22px;
    cursor: pointer;
  }

  /* ========== RESULT SCREEN ========== */
  #result-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 24px;
    text-align: center;
    gap: 20px;
  }

  .result-title {
    font-size: clamp(13px, 3.5vw, 16px);
    font-weight: 300;
    letter-spacing: 3px;
    color: #aaa;
  }

  .result-profile {
    font-size: clamp(26px, 8vw, 36px);
    font-weight: 300;
    color: #fff;
    line-height: 1.2;
  }

  .result-profile span { color: #cc0000; }

  .result-verse {
    font-size: clamp(14px, 4vw, 17px);
    color: #ccc;
    font-style: italic;
    line-height: 1.6;
    font-weight: 300;
    border-left: 3px solid #cc0000;
    padding-left: 16px;
    text-align: left;
  }

  .result-ref {
    font-size: 13px;
    color: #888;
    text-align: right;
    width: 100%;
  }

  .btn-restart {
    background: #cc0000;
    color: #fff;
    border: none;
    width: 90%;
    padding: 16px;
    font-size: clamp(14px, 4vw, 17px);
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<!-- ========== HOME ========== -->
<div id="home" class="screen active">
  <div class="home-mosaic" id="mosaic"></div>

  <div class="home-center">
    <div class="home-logo">ТЕО<span>ТЕСТ</span>®</div>
    <div class="home-tagline">10 запитань. <span>Назавжди</span> жити з відповідями.</div>
    <button class="btn-start" onclick="startTest()">РОЗПОЧАТИ ТЕСТ</button>
  </div>

  <div class="home-bottom">
    <div class="home-bottom-block">
      РЕСУРСИ <span class="red">ТЕОТЕСТ</span>
    </div>
    <div class="home-bottom-block">
      ТЕОТЕСТ<br>МАТЕРІАЛИ
    </div>
  </div>
</div>

<!-- ========== QUESTION SCREEN ========== -->
<div id="question-screen" class="screen">
  <div class="q-header">
    <button class="q-back" onclick="goBack()">&#8249;</button>
    <div class="q-title">ТЕО<span>ТЕСТ</span>®</div>
  </div>

  <div class="q-progress-bar">
    <div class="q-progress-fill" id="progressFill"></div>
  </div>

  <div class="q-body">
    <div class="q-label-row">
      <div class="q-label" id="qLabel">ЗАПИТАННЯ 1</div>
      <button class="q-hint-btn" onclick="showHint()" id="hintBtn">?</button>
    </div>

    <div class="q-text" id="qText"></div>

    <div id="qOptions" class="q-options"></div>
    <div id="qCustomInput" class="q-custom-input">
      <input type="text" placeholder="Ваш варіант..." id="customInputField">
    </div>

    <div class="q-notes">
      <textarea id="qNotes" placeholder="Додаткові коментарі"></textarea>
    </div>
  </div>

  <button class="btn-next" onclick="nextQuestion()">ДАЛІ ›</button>
</div>

<!-- ========== RESULT SCREEN ========== -->
<div id="result-screen" class="screen">
  <div class="result-title">ВАШ ПРОФІЛЬ</div>
  <div class="result-profile" id="resultProfile"></div>
  <div class="result-verse" id="resultVerse"></div>
  <div class="result-ref" id="resultRef"></div>
  <button class="btn-restart" onclick="restartTest()">ПРОЙТИ ЩЕ РАЗ</button>
</div>

<!-- ========== HINT OVERLAY ========== -->
<div class="hint-overlay" id="hintOverlay">
  <div class="hint-box">
    <button class="hint-close" onclick="closeHint()">&#10005;</button>
    <h3>ПІДКАЗКА ДЛЯ ВЕДУЧОГО</h3>
    <p id="hintText"></p>
  </div>
</div>

<script>
// ========== DATA ==========

const believerQuestions = [
  {
    text: "Чи вірите ви в Бога?",
    type: "radio",
    options: ["Так"],
    hint: "Відправна точка. Визначає, що людина відносить себе до тих, хто вірить. Відкриває розмову про природу цієї віри."
  },
  {
    text: "Як би ви описали Бога?",
    type: "radio",
    options: ["Люблячий", "Святий", "Безособистісна Енергія", "Байдужий", "custom"],
    hint: "Розкриває уявлення людини про характер Бога. Допомагає зрозуміти, чи відповідає їхній образ Бога біблійному."
  },
  {
    text: "Чого від нас очікує Бог?",
    type: "radio",
    options: ["Вірити в Нього", "Не шкодити іншим", "Дотримуватись правил", "Нічого", "custom"],
    hint: "Виявляє розуміння людиною стосунків з Богом. Чи це стосунки вимог, чи благодаті?"
  },
  {
    text: "Як ви задовольняєте Його вимоги?",
    type: "scale",
    hint: "Шкала показує, наскільки людина впевнена у своїй праведності. Відкриває тему потреби у спасінні."
  },
  {
    text: "Чи тільки одна релігія приводить до правдивого Бога?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений"],
    hint: "Торкається теми ексклюзивності Євангелія. Важливо для розмови про Ісуса як єдиний шлях."
  },
  {
    text: "Чи вірите ви у Небеса (Рай)?",
    type: "radio",
    options: ["Так", "Ні", "Вірю в реінкарнацію", "Не впевнений"],
    hint: "Перевіряє есхатологічні погляди. Відкриває тему вічності та відповідальності перед Богом."
  },
  {
    text: "Чи кожен потрапить туди?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений", "Раю не існує"],
    hint: "Виявляє погляд на універсалізм. Допомагає перейти до теми суду та праведності Бога."
  },
  {
    text: "Чи ви потрапите на небеса?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений", "Раю не існує"],
    hint: "Особисте питання про впевненість у спасінні. Відкриває тему засобів спасіння."
  },
  {
    text: "Чому ви потрапите туди або чому ні?",
    type: "radio",
    options: ["Так, усі туди потраплять", "Так, я хороша людина", "Так, Бог спас мене", "Ні, бо не достатньо хороший", "Раю не існує"],
    hint: "Ключове питання про основу спасіння. Розкриває різницю між спасінням через справи і через благодать."
  },
  {
    text: "Чи ви б хотіли знати, як на ці питання відповідає Біблія?",
    type: "radio",
    options: ["Знаю і погоджуюсь", "Знаю і не погоджуюсь", "Не цікаво", "Хотів би довідатись"],
    hint: "Завершальне питання. Відкриває можливість поділитись Євангелієм або запросити на вивчення Біблії."
  }
];

const skepticQuestions = [
  {
    text: "Чи вірите ви в Бога?",
    type: "radio",
    options: ["Ні"],
    hint: "Відправна точка для скептика. Відкриває простір для чесного діалогу без осуду."
  },
  {
    text: "Назвіть основні причини, з яких ви не вірите в Бога!",
    type: "radio",
    options: ["Протиріччя з наукою", "Зло і страждання", "Брак доказів", "Багато релігій", "custom"],
    hint: "Дає зрозуміти головний бар'єр людини. Кожна відповідь — це окрема тема для глибшої розмови."
  },
  {
    text: "Чому взагалі щось існує, а не просто нічого?",
    type: "radio",
    options: ["Завжди існувало", "Створило само себе", "Закони фізики", "Не маю поняття", "custom"],
    hint: "Космологічне питання. Підводить до аргументу першопричини і неможливості самовиникнення."
  },
  {
    text: "Чи ви бачите якусь ціль чи значення в існуванні Всесвіту?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений"],
    hint: "Питання про телеологію. Якщо людина бачить сенс — звідки він береться без Творця?"
  },
  {
    text: "Звідки взялось життя на Землі?",
    type: "radio",
    options: ["Випадковість", "Закони природи", "Позаземне походження", "Не впевнений", "custom"],
    hint: "Торкається питання походження. Відкриває тему неймовірної складності живих організмів."
  },
  {
    text: "Чи існує зло?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений"],
    hint: "Якщо зло існує — існує і добро. Якщо існує об'єктивне добро — існує моральний закон. Якщо є закон — є Законодавець."
  },
  {
    text: "На чому базується ваша моральність?",
    type: "radio",
    options: ["Ні на чому", "Соціальні норми", "Еволюція", "Почуття", "custom"],
    hint: "Питання про основу моралі. Без Бога мораль стає суб'єктивною — і це відкриває важливу розмову."
  },
  {
    text: "Чи людське життя є особливішим за життя рослин чи тварин?",
    type: "radio",
    options: ["Так", "Ні", "Не впевнений"],
    hint: "Питання про гідність людини. Звідки береться ця особливість, якщо ми лише продукт еволюції?"
  },
  {
    text: "На скільки ви переконані, що Бога не існує?",
    type: "scale",
    hint: "Шкала впевненості. Більшість скептиків не є на 10/10 — це відкриває простір для сумніву і пошуку."
  },
  {
    text: "Чи хотіли б ви почути, як теїсти відповідають на ці запитання?",
    type: "radio",
    options: ["Так", "Ні"],
    hint: "Завершальне питання. Відкриває можливість поділитись теїстичними відповідями і продовжити діалог."
  }
];

// ========== STATE ==========
let currentBranch = null; // 'believer' or 'skeptic'
let currentIndex = 0;
let answers = [];
let notes = [];

// ========== MOSAIC ==========
const mosaicSymbols = ['✝', '☪', '✡', '☯', 'ॐ', '☸', '⛎', '✞', '☦', '⚛', 'E=mc²', '☥', '🕉', '✙', '☩'];

function buildMosaic() {
  const mosaic = document.getElementById('mosaic');
  mosaic.innerHTML = '';
  for (let i = 0; i < 24; i++) {
    const cell = document.createElement('div');
    cell.className = 'mosaic-cell';
    const sym = mosaicSymbols[Math.floor(Math.random() * mosaicSymbols.length)];
    cell.textContent = sym;
    cell.style.fontSize = Math.random() > 0.5 ? '16px' : '11px';
    cell.style.color = Math.random() > 0.7 ? '#cc0000' : '#333';
    mosaic.appendChild(cell);
  }
}

// ========== NAVIGATION ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTest() {
  currentBranch = null;
  currentIndex = 0;
  answers = [];
  notes = [];
  renderQuestion();
  showScreen('question-screen');
}

function goBack() {
  if (currentIndex === 0) {
    showScreen('home');
  } else {
    currentIndex--;
    renderQuestion();
  }
}

function restartTest() {
  showScreen('home');
}

// ========== RENDER QUESTION ==========
function getQuestions() {
  if (currentBranch === 'skeptic') return skepticQuestions;
  if (currentBranch === 'believer') return believerQuestions;
  // First question — same for both
  return [{
    text: "Чи вірите ви в Бога?",
    type: "radio",
    options: ["Так", "Ні"],
    hint: "Відправна точка тесту. Визначає напрямок розмови — для тих, хто вірить, і для скептиків."
  }];
}

function renderQuestion() {
  const questions = getQuestions();
  const q = questions[currentIndex];

  // Progress
  const total = 10;
  const progress = ((currentIndex + 1) / total) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  // Label
  document.getElementById('qLabel').textContent = 'ЗАПИТАННЯ ' + (currentIndex + 1);

  // Text
  document.getElementById('qText').textContent = q.text;

  // Notes
  document.getElementById('qNotes').value = notes[currentIndex] || '';

  // Options
  const optionsDiv = document.getElementById('qOptions');
  const customDiv = document.getElementById('qCustomInput');
  optionsDiv.innerHTML = '';
  customDiv.classList.remove('visible');

  if (q.type === 'radio') {
    q.options.forEach((opt, i) => {
      if (opt === 'custom') {
        const label = document.createElement('label');
        label.className = 'q-option';
        label.innerHTML = \`
          <input type="radio" name="qOption" value="custom" \${answers[currentIndex] === 'custom' ? 'checked' : ''}>
          <div class="q-radio"></div>
          <span class="q-option-label">Ваш варіант</span>
        \`;
        label.querySelector('input').addEventListener('change', function() {
          if (this.checked) customDiv.classList.add('visible');
        });
        optionsDiv.appendChild(label);
        if (answers[currentIndex] === 'custom') customDiv.classList.add('visible');
      } else {
        const label = document.createElement('label');
        label.className = 'q-option';
        label.innerHTML = \`
          <input type="radio" name="qOption" value="\${opt}" \${answers[currentIndex] === opt ? 'checked' : ''}>
          <div class="q-radio"></div>
          <span class="q-option-label">\${opt}</span>
        \`;
        label.querySelector('input').addEventListener('change', function() {
          customDiv.classList.remove('visible');
        });
        optionsDiv.appendChild(label);
      }
    });
  } else if (q.type === 'scale') {
    const scaleDiv = document.createElement('div');
    scaleDiv.className = 'q-scale';
    for (let n = 1; n <= 10; n++) {
      const btn = document.createElement('button');
      btn.className = 'scale-btn' + (answers[currentIndex] == n ? ' selected' : '');
      btn.textContent = n;
      btn.onclick = function() {
        answers[currentIndex] = n;
        document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
      };
      scaleDiv.appendChild(btn);
    }
    optionsDiv.appendChild(scaleDiv);
  }
}

// ========== NEXT ==========
function nextQuestion() {
  // Save notes
  notes[currentIndex] = document.getElementById('qNotes').value;

  // Save answer
  if (getQuestions()[currentIndex].type === 'radio') {
    const selected = document.querySelector('input[name="qOption"]:checked');
    if (selected) {
      if (selected.value === 'custom') {
        answers[currentIndex] = document.getElementById('customInputField').value || 'custom';
      } else {
        answers[currentIndex] = selected.value;
      }
    }
  }

  // First question — determine branch
  if (currentBranch === null && currentIndex === 0) {
    const ans = answers[0];
    if (ans === 'Так') {
      currentBranch = 'believer';
    } else if (ans === 'Ні') {
      currentBranch = 'skeptic';
    } else {
      currentBranch = 'believer'; // default
    }
    currentIndex = 1;
    renderQuestion();
    return;
  }

  const questions = getQuestions();
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

// ========== HINT ==========
function showHint() {
  const q = getQuestions()[currentIndex];
  document.getElementById('hintText').textContent = q.hint || 'Підказка відсутня.';
  document.getElementById('hintOverlay').classList.add('visible');
}

function closeHint() {
  document.getElementById('hintOverlay').classList.remove('visible');
}

// ========== RESULT ==========
function showResult() {
  let profile, verse, ref;

  if (currentBranch === 'believer') {
    const lastAns = answers[9];
    if (lastAns === 'Хотів би довідатись') {
      profile = 'Шукач <span>Істини</span>';
      verse = '"Просіть — і дасться вам, шукайте — і знайдете, стукайте — і відчиниться вам."';
      ref = 'Матвія 7:7';
    } else if (lastAns === 'Знаю і погоджуюсь') {
      profile = 'Впевнений <span>у Вірі</span>';
      verse = '"Бо я знаю, кому я повірив, і переконаний, що Він силен зберегти довірене мені."';
      ref = '2 Тимофія 1:12';
    } else {
      profile = 'Духовний <span>Мандрівник</span>';
      verse = '"Наближтесь до Бога, і Він наблизиться до вас."';
      ref = 'Якова 4:8';
    }
  } else {
    const lastAns = answers[9];
    if (lastAns === 'Так') {
      profile = 'Відкритий <span>Розум</span>';
      verse = '"Небеса розповідають про славу Бога, і про діла рук Його звіщає небозвід."';
      ref = 'Псалом 19:1';
    } else {
      profile = 'Чесний <span>Скептик</span>';
      verse = '"Якщо будете шукати Мене всім серцем своїм — знайдете Мене."';
      ref = 'Єремія 29:13';
    }
  }

  document.getElementById('resultProfile').innerHTML = profile;
  document.getElementById('resultVerse').textContent = verse;
  document.getElementById('resultRef').textContent = '— ' + ref;
  showScreen('result-screen');
}

// ========== INIT ==========
buildMosaic();
</script>
