<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ТеоТест</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  .screen {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100dvh;
  }
  .screen.active { display: flex; }

  /* ===== HOME ===== */
  #home {
    justify-content: center;
    align-items: center;
    padding: 5vw;
    gap: 4vh;
  }
  .home-logo {
    font-size: clamp(44px, 20vw, 100px);
    font-weight: 100;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
    width: 100%;
  }
  .home-logo span { color: #cc0000; }
  .home-subtitle {
    font-size: clamp(13px, 3.5vw, 18px);
    color: #aaa;
    text-align: center;
    font-weight: 300;
  }
  .home-subtitle span { color: #cc0000; }
  .btn-start {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: clamp(14px, 3vh, 22px) 40px;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 400;
    letter-spacing: 3px;
    cursor: pointer;
    width: 100%;
    max-width: 340px;
    text-transform: uppercase;
  }

  /* ===== QUESTION SCREEN ===== */
  #question-screen {
    justify-content: space-between;
    height: 100dvh;
    overflow: hidden;
  }

  /* Header */
  .q-header {
    flex-shrink: 0;
    background: #000;
    padding: clamp(6px, 1.5vh, 14px) 16px clamp(4px, 1vh, 10px);
    text-align: center;
    border-bottom: 1px solid #222;
  }
  .q-logo { font-size: clamp(28px, 4vw, 42px); font-weight: 300; letter-spacing: 2px; }
  .q-logo span { color: #cc0000; }
  .q-progress { height: 3px; background: #222; margin-top: 6px; }
  .q-progress-bar { height: 3px; background: #cc0000; transition: width 0.3s; }

  /* Body — займає весь простір між header і footer */
  .q-body {
    flex: 1;
    min-height: 0;
    padding: clamp(6px, 1.5vh, 14px) 16px clamp(4px, 1vh, 10px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .q-label-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: clamp(4px, 1vh, 10px);
    flex-shrink: 0;
  }
  .q-label {
    font-size: clamp(13px, 3.5vw, 18px);
    font-weight: 300;
    letter-spacing: 4px;
    color: #aaa;
    text-transform: uppercase;
  }
  .q-hint-btn {
    background: #cc0000;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: clamp(20px, 5vw, 26px);
    height: clamp(20px, 5vw, 26px);
    font-size: clamp(12px, 3vw, 15px);
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .q-text {
    font-size: clamp(16px, 4.5vw, 26px);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: clamp(6px, 1.5vh, 14px);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Варіанти — скролюються якщо не вміщаються */
  .q-options-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .q-options { display: flex; flex-direction: column; gap: clamp(5px, 1.2vh, 10px); }
  .q-option {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: clamp(13px, 3.5vw, 17px);
    font-weight: 300;
  }
  .q-option input[type="radio"] {
    appearance: none;
    -webkit-appearance: none;
    width: clamp(16px, 4vw, 20px);
    height: clamp(16px, 4vw, 20px);
    border: 2px solid #fff;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
  }
  .q-option input[type="radio"]:checked { background: #cc0000; border-color: #cc0000; }
  .q-custom-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #555;
    color: #fff;
    font-size: clamp(13px, 3.5vw, 16px);
    padding: 2px 0;
    width: 100%;
    outline: none;
  }

  .q-notes {
    background: #fff;
    color: #333;
    border: none;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: clamp(12px, 3vw, 14px);
    resize: none;
    height: clamp(44px, 8vh, 70px);
    width: 100%;
    outline: none;
    margin-top: clamp(4px, 1vh, 10px);
    flex-shrink: 0;
  }
  .q-notes::placeholder { color: #999; }

  /* Scale */
  .q-scale { display: flex; gap: clamp(4px, 1.5vw, 8px); flex-wrap: wrap; margin-bottom: clamp(6px, 1.5vh, 12px); }
  .scale-btn {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    border-radius: 4px;
    width: clamp(30px, 8vw, 42px);
    height: clamp(30px, 8vw, 42px);
    font-size: clamp(13px, 3.5vw, 17px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scale-btn.selected { background: #cc0000; border-color: #cc0000; }

  /* ===== NEXT BUTTON ===== */
  .q-footer { flex-shrink: 0; }
  .btn-next {
    background: #000;
    color: #fff;
    border: none;
    border-top: 2px solid #333;
    width: 100%;
    padding: clamp(14px, 3.5vh, 28px) 0;
    font-size: clamp(24px, 8vw, 48px);
    font-weight: 300;
    letter-spacing: 6px;
    cursor: pointer;
    text-align: center;
    text-transform: uppercase;
  }
  .btn-next:active { background: #111; }

  /* ===== HINT OVERLAY ===== */
  .hint-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .hint-overlay.active { display: flex; }
  .hint-box {
    background: #111;
    border: 1px solid #cc0000;
    border-radius: 10px;
    padding: 22px;
    max-width: 340px;
    width: 100%;
    position: relative;
  }
  .hint-title { color: #cc0000; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
  .hint-text { font-size: clamp(13px, 3.5vw, 15px); font-weight: 300; line-height: 1.6; color: #ddd; }
  .hint-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }

  /* ===== RESULT ===== */
  #result-screen { justify-content: center; align-items: center; padding: 30px 20px; text-align: center; gap: clamp(12px, 3vh, 24px); }
  .result-logo { font-size: clamp(18px, 5vw, 24px); font-weight: 300; letter-spacing: 2px; }
  .result-logo span { color: #cc0000; }
  .result-title { font-size: clamp(20px, 6vw, 28px); font-weight: 300; letter-spacing: 2px; }
  .result-verse { font-size: clamp(13px, 3.5vw, 16px); font-weight: 300; color: #ccc; line-height: 1.6; font-style: italic; max-width: 300px; }
  .result-ref { color: #cc0000; font-size: clamp(11px, 3vw, 14px); }
  .btn-restart {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: clamp(12px, 2.5vh, 18px) 40px;
    font-size: clamp(14px, 3.5vw, 17px);
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    width: 100%;
    max-width: 300px;
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-logo">ТЕО<span>ТЕСТ</span></div>
  <div class="home-subtitle">10 запитань. <span>Назавжди</span> жити з відповідями.</div>
  <button class="btn-start" onclick="startTest()">РОЗПОЧАТИ ТЕСТ</button>
</div>

<!-- QUESTION -->
<div id="question-screen" class="screen">
  <div class="q-header">
    <div class="q-logo">ТЕО<span>ТЕСТ</span></div>
    <div class="q-progress"><div class="q-progress-bar" id="progressBar"></div></div>
  </div>
  <div class="q-body" id="qBody"></div>
  <div class="q-footer">
    <button class="btn-next" onclick="nextQuestion()">ДАЛІ ›</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-logo">ТЕО<span>ТЕСТ</span></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-verse" id="resultVerse"></div>
  <div class="result-ref" id="resultRef"></div>
  <button class="btn-restart" onclick="restartTest()">ПОЧАТИ ЗНОВУ</button>
</div>

<!-- HINT OVERLAY -->
<div class="hint-overlay" id="hintOverlay" onclick="closeHint(event)">
  <div class="hint-box">
    <button class="hint-close" onclick="closeHintBtn()">✕</button>
    <div class="hint-title">Підказка для ведучого</div>
    <div class="hint-text" id="hintText"></div>
  </div>
</div>

<script>
var questionsTheist = [
  { q: "ЯК БИ ВИ ОПИСАЛИ БОГА?", type: "radio",
    options: ["Люблячий", "Святий", "Безособистісна Енергія", "Байдужий"], custom: "Ваш варіант",
    hint: "Це питання розкриває уявлення людини про природу Бога. Відповідь допоможе зрозуміти, з якого кута підходити до розмови про Євангеліє." },
  { q: "ЧОГО ВІД НАС ОЧІКУЄ БОГ?", type: "radio",
    options: ["Вірити в Нього", "Не шкодити іншим", "Дотримуватись правил", "Нічого"], custom: "Ваш варіант",
    hint: "Показує, чи розуміє людина концепцію благодаті. Якщо 'дотримуватись правил' — відкриває розмову про різницю між релігією і стосунками з Богом." },
  { q: "ЯК ВИ ЗАДОВОЛЬНЯЄТЕ ЙОГО ВИМОГИ?", type: "scale",
    hint: "Шкала від 1 до 10 показує, наскільки людина вважає себе 'достатньо доброю'. Відкриває розмову про стандарт Бога і потребу в спасінні." },
  { q: "ЧИ ТІЛЬКИ ОДНА РЕЛІГІЯ ПРИВОДИТЬ ДО ПРАВДИВОГО БОГА?", type: "radio",
    options: ["Так", "Ні", "Не впевнений"],
    hint: "Розкриває ставлення до ексклюзивності Христа (Ів. 14:6). Якщо 'Ні' — відкриває розмову про відмінність між релігіями." },
  { q: "ЧИ ВІРИТЕ ВИ У НЕБЕСА (РАЙ)?", type: "radio",
    options: ["Так", "Ні", "Вірю в реінкарнацію", "Не впевнений"],
    hint: "Визначає базове розуміння вічності. Якщо реінкарнація — відкриває розмову про біблійне вчення про смерть і воскресіння." },
  { q: "ЧИ КОЖЕН ПОТРАПИТЬ НА НЕБЕСА?", type: "radio",
    options: ["Так", "Ні", "Не впевнений", "Раю не існує"],
    hint: "Показує, чи є розуміння суду і відповідальності. Відкриває тему праведності Бога і необхідності примирення." },
  { q: "ЧИ ВИ ПОТРАПИТЕ НА НЕБЕСА?", type: "radio",
    options: ["Так", "Ні", "Не впевнений", "Раю не існує"],
    hint: "Особисте питання. Якщо людина не впевнена — ключовий момент для розмови про впевненість у спасінні через Христа." },
  { q: "ЧОМУ ВИ ПОТРАПИТЕ ТУДИ АБО ЧОМУ НІ?", type: "radio",
    options: ["Так, усі туди потраплять", "Так, я хороша людина", "Так, Бог спас мене", "Ні, бо не достатньо хороший", "Раю не існує"],
    hint: "Центральне питання тесту. 'Так, Бог спас мене' — привід для радості. Інші відповіді — привід пояснити Євангеліє." },
  { q: "ЧИ ВИ Б ХОТІЛИ ЗНАТИ, ЯК НА ЦІ ПИТАННЯ ВІДПОВІДАЄ БІБЛІЯ?", type: "radio",
    options: ["Знаю і погоджуюсь", "Знаю і не погоджуюсь", "Не цікаво", "Хотів би довідатись"],
    hint: "Фінальне питання. Якщо 'Хотів би довідатись' — запрошення поділитись Євангелієм або запросити на Біблійні Основи." }
];

var questionsSkeptic = [
  { q: "НАЗВІТЬ ОСНОВНІ ПРИЧИНИ, З ЯКИХ ВИ НЕ ВІРИТЕ В БОГА", type: "radio",
    options: ["Протиріччя з наукою", "Зло і страждання", "Брак доказів", "Багато релігій"], custom: "Ваша версія",
    hint: "Дізнайтесь головну перешкоду. Це визначає весь подальший діалог і показує, де найбільше болить." },
  { q: "ЧОМУ ВЗАГАЛІ ЩОСЬ ІСНУЄ, А НЕ ПРОСТО НІЧОГО?", type: "radio",
    options: ["Завжди існувало", "Створило само себе", "Закони фізики", "Не маю поняття"], custom: "Ваша версія",
    hint: "Питання про першопричину. Жодна з атеїстичних відповідей не є задовільною — відкриває простір для розмови про Творця." },
  { q: "ЧИ ВИ БАЧИТЕ ЯКУСЬ ЦІЛЬ ЧИ ЗНАЧЕННЯ В ІСНУВАННІ ВСЕСВІТУ?", type: "radio",
    options: ["Так", "Ні", "Не впевнений"],
    hint: "Якщо бачить ціль — звідки вона? Якщо ні — як живе без сенсу? Обидві відповіді відкривають глибоку розмову." },
  { q: "ЗВІДКИ ВЗЯЛОСЬ ЖИТТЯ НА ЗЕМЛІ?", type: "radio",
    options: ["Випадковість", "Закони природи", "Позаземне походження", "Не впевнений"], custom: "Ваш варіант",
    hint: "Навіть 'позаземне походження' лише відсуває проблему — хто створив позаземне життя?" },
  { q: "ЧИ ІСНУЄ ЗЛО?", type: "radio",
    options: ["Так", "Ні", "Не впевнений"],
    hint: "Якщо зло існує — потрібен об'єктивний моральний стандарт. Якщо стандарт є — звідки він? Це веде до Бога." },
  { q: "НА ЧОМУ БАЗУЄТЬСЯ ВАША МОРАЛЬНІСТЬ?", type: "radio",
    options: ["Ні на чому", "Соціальні норми", "Еволюція", "Почуття"], custom: "Ваш варіант",
    hint: "Якщо мораль — лише еволюція або почуття, вона відносна. Але люди поводяться так, ніби мораль абсолютна. Звідки це?" },
  { q: "ЧИ ЛЮДСЬКЕ ЖИТТЯ Є ОСОБЛИВІШИМ ЗА ЖИТТЯ РОСЛИН ЧИ ТВАРИН?", type: "radio",
    options: ["Так", "Ні", "Не впевнений"],
    hint: "Якщо так — чому? З еволюційної точки зору ми просто складніші тварини. Особливість людини вказує на образ Божий (Бут. 1:27)." },
  { q: "НА СКІЛЬКИ ВИ ПЕРЕКОНАНІ, ЩО БОГА НЕ ІСНУЄ?", type: "scale",
    hint: "Шкала показує ступінь переконаності. Більшість скептиків — агностики, а не атеїсти. Це відкриває розмову про можливість Бога." },
  { q: "ЧИ ХОТІЛИ Б ВИ ПОЧУТИ, ЯК ТЕЇСТИ ВІДПОВІДАЮТЬ НА ЦІ ЗАПИТАННЯ?", type: "radio",
    options: ["Так", "Ні"],
    hint: "Фінальне питання. Якщо 'Так' — чудова можливість поділитись своєю вірою або запросити на розмову." }
];

var branch = "";
var currentQ = 0;
var questions = [];
var answers = [];

function startTest() {
  showScreen("question-screen");
  renderFirstQuestion();
}

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

function renderFirstQuestion() {
  var body = document.getElementById("qBody");
  document.getElementById("progressBar").style.width = "9%";
  body.innerHTML =
    '<div class="q-label-row">' +
      '<div class="q-label">ЗАПИТАННЯ 1</div>' +
      '<button class="q-hint-btn" onclick="showHint(\'Вступне питання визначає гілку тесту. Так — для віруючих, Ні — для скептиків.\')">?</button>' +
    '</div>' +
    '<div class="q-text">ЧИ ВІРИТЕ ВИ В БОГА?</div>' +
    '<div class="q-options-wrap">' +
      '<div class="q-options">' +
        '<label class="q-option"><input type="radio" name="q0" value="yes"> Так</label>' +
        '<label class="q-option"><input type="radio" name="q0" value="no"> Ні</label>' +
      '</div>' +
    '</div>' +
    '<textarea class="q-notes" placeholder="Додаткові нотатки..."></textarea>';
}

function nextQuestion() {
  if (branch === "") {
    var sel = document.querySelector('input[name="q0"]:checked');
    if (!sel) { alert("Будь ласка, оберіть відповідь"); return; }
    branch = sel.value === "yes" ? "theist" : "skeptic";
    questions = branch === "theist" ? questionsTheist : questionsSkeptic;
    currentQ = 0;
    answers = new Array(questions.length).fill(null);
    renderQuestion(0);
    return;
  }
  saveAnswer(currentQ);
  currentQ++;
  if (currentQ >= questions.length) { showResult(); return; }
  renderQuestion(currentQ);
}

function renderQuestion(idx) {
  var q = questions[idx];
  var progress = Math.round(((idx + 2) / (questions.length + 2)) * 100);
  document.getElementById("progressBar").style.width = progress + "%";
  var body = document.getElementById("qBody");

  var html =
    '<div class="q-label-row">' +
      '<div class="q-label">ЗАПИТАННЯ ' + (idx + 2) + '</div>' +
      '<button class="q-hint-btn" onclick=\'showHint(' + JSON.stringify(q.hint) + ')\'>?</button>' +
    '</div>' +
    '<div class="q-text">' + q.q + '</div>' +
    '<div class="q-options-wrap">';

  if (q.type === "radio") {
    html += '<div class="q-options">';
    for (var i = 0; i < q.options.length; i++) {
      var chk = (answers[idx] && answers[idx].value === q.options[i]) ? " checked" : "";
      html += '<label class="q-option"><input type="radio" name="qr" value="' + q.options[i] + '"' + chk + '> ' + q.options[i] + '</label>';
    }
    if (q.custom) {
      var cVal = (answers[idx] && answers[idx].custom) ? answers[idx].custom : "";
      var cChk = (answers[idx] && answers[idx].value === "__custom__") ? " checked" : "";
      html += '<label class="q-option"><input type="radio" name="qr" value="__custom__"' + cChk + '> ' +
        '<input class="q-custom-input" id="customInput" type="text" placeholder="' + q.custom + '" value="' + cVal + '"></label>';
    }
    html += '</div>';
  } else if (q.type === "scale") {
    var saved = answers[idx] ? answers[idx].value : null;
    html += '<div class="q-scale">';
    for (var j = 1; j <= 10; j++) {
      var sel2 = (saved == j) ? " selected" : "";
      html += '<button class="scale-btn' + sel2 + '" onclick="selectScale(this,' + j + ')">' + j + '</button>';
    }
    html += '</div>';
  }

  html += '</div>';
  html += '<textarea class="q-notes" placeholder="Додаткові нотатки...">' +
    (answers[idx] && answers[idx].notes ? answers[idx].notes : "") + '</textarea>';
  body.innerHTML = html;
}

function selectScale(btn, val) {
  var btns = document.querySelectorAll(".scale-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("selected");
  btn.classList.add("selected");
  btn.dataset.val = val;
}

function saveAnswer(idx) {
  var q = questions[idx];
  var notesEl = document.querySelector(".q-notes");
  var notes = notesEl ? notesEl.value : "";
  if (q.type === "radio") {
    var sel = document.querySelector('input[name="qr"]:checked');
    var ci = document.getElementById("customInput");
    answers[idx] = { value: sel ? sel.value : null, custom: ci ? ci.value : "", notes: notes };
  } else {
    var sb = document.querySelector(".scale-btn.selected");
    answers[idx] = { value: sb ? (sb.dataset.val || sb.textContent) : null, notes: notes };
  }
}

function showHint(text) {
  document.getElementById("hintText").textContent = text;
  document.getElementById("hintOverlay").classList.add("active");
}
function closeHint(e) {
  if (e.target === document.getElementById("hintOverlay"))
    document.getElementById("hintOverlay").classList.remove("active");
}
function closeHintBtn() {
  document.getElementById("hintOverlay").classList.remove("active");
}

function showResult() {
  showScreen("result-screen");
  var title, verse, ref;
  var last = answers[answers.length - 1];
  if (branch === "theist") {
    if (last && last.value === "Хотів би довідатись") {
      title = "ВІДКРИТЕ СЕРЦЕ";
      verse = "Бо так полюбив Бог світ, що дав Сина Свого Єдинородного, щоб кожен, хто вірує в Нього, не загинув, але мав вічне життя.";
      ref = "Іван 3:16";
    } else if (last && last.value === "Так, Бог спас мене") {
      title = "ВПЕВНЕНИЙ У ВІРІ";
      verse = "Бо благодаттю ви спасені через віру, і це не від вас — це дар Божий.";
      ref = "Ефесян 2:8";
    } else {
      title = "ДУХОВНИЙ МАНДРІВНИК";
      verse = "Шукайте Господа, поки Він може бути знайдений, кличте до Нього, поки Він близько.";
      ref = "Ісая 55:6";
    }
  } else {
    if (last && last.value === "Так") {
      title = "ШУКАЧ ІСТИНИ";
      verse = "Шукайте і знайдете; стукайте і відчинять вам.";
      ref = "Матвія 7:7";
    } else {
      title = "ЧЕСНИЙ СКЕПТИК";
      verse = "Бо невидиме Його, вічна сила Його і Божество, від створення світу через розгляд творінь стають видимими.";
      ref = "Римлян 1:20";
    }
  }
  document.getElementById("resultTitle").textContent = title;
  document.getElementById("resultVerse").textContent = verse;
  document.getElementById("resultRef").textContent = ref;
}

function restartTest() {
  branch = ""; currentQ = 0; questions = []; answers = [];
  showScreen("home");
}
</script>
</body>
</html>
