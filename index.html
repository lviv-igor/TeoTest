<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ТеоТест</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Arial Narrow', Arial, sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    flex-direction: column;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* ===== HEADER ===== */
  .test-header {
    text-align: center;
    padding: 10px 0 4px;
    flex-shrink: 0;
  }
  .test-header .logo {
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 400;
    letter-spacing: 2px;
    color: #fff;
  }
  .test-header .logo span { color: #cc0000; }

  /* ===== PROGRESS BAR ===== */
  .progress-bar {
    height: 3px;
    background: #222;
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: #cc0000;
    transition: width 0.4s ease;
  }

  /* ===== QUESTION SCREEN ===== */
  .question-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 20px;
    overflow: hidden;
  }

  .question-label {
    text-align: center;
    font-size: clamp(11px, 2.5vw, 13px);
    font-weight: 400;
    letter-spacing: 3px;
    color: #aaa;
    padding: 6px 0 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .hint-btn {
    width: 20px;
    height: 20px;
    background: #cc0000;
    border-radius: 50%;
    border: none;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  /* ===== TOOLTIP ===== */
  .tooltip-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .tooltip-overlay.show { display: flex; }
  .tooltip-box {
    background: #1a1a1a;
    border: 1px solid #cc0000;
    border-radius: 10px;
    padding: 24px 20px;
    max-width: 360px;
    width: 100%;
    position: relative;
  }
  .tooltip-box h3 {
    color: #cc0000;
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .tooltip-box p {
    color: #ddd;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 300;
  }
  .tooltip-close {
    position: absolute;
    top: 10px; right: 14px;
    background: none;
    border: none;
    color: #aaa;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }

  .question-text {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 400;
    line-height: 1.2;
    text-transform: uppercase;
    padding: 6px 0 8px;
    flex-shrink: 0;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    padding: 4px 0;
  }

  .option-label {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    padding: 2px 0;
  }

  .option-label input[type="radio"] { display: none; }

  .radio-circle {
    width: 18px;
    height: 18px;
    border: 1.5px solid #fff;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .radio-circle::after {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #cc0000;
    display: none;
  }
  .option-label input:checked + .radio-circle::after { display: block; }
  .option-label input:checked + .radio-circle { border-color: #cc0000; }

  .option-text {
    font-size: clamp(14px, 3.5vw, 17px);
    font-weight: 300;
    color: #fff;
  }

  .notes-area {
    flex: 1;
    margin: 8px 0 6px;
    background: #fff;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    color: #333;
    border: none;
    resize: none;
    font-family: Arial, sans-serif;
    min-height: 50px;
    max-height: 120px;
  }
  .notes-area::placeholder { color: #999; }

  /* ===== NEXT BUTTON ===== */
  .next-btn {
    width: calc(100% - 0px);
    background: none;
    border: none;
    color: #333;
    font-size: clamp(36px, 10vw, 52px);
    font-weight: 400;
    letter-spacing: 6px;
    text-align: center;
    cursor: pointer;
    padding: 8px 0 12px;
    flex-shrink: 0;
    text-transform: uppercase;
    transition: color 0.2s;
    display: block;
  }
  .next-btn:hover { color: #555; }

  /* ===== HOME SCREEN ===== */
  #home {
    justify-content: space-between;
  }

  .mosaic {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
    flex-shrink: 0;
    height: 38vh;
    overflow: hidden;
  }
  .mosaic-cell {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(8px, 2vw, 13px);
    color: #555;
    overflow: hidden;
    aspect-ratio: auto;
  }
  .mosaic-cell span { font-size: clamp(14px, 3.5vw, 22px); }

  .home-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }

  .home-logo {
    font-size: clamp(28px, 8vw, 42px);
    font-weight: 400;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .home-logo span { color: #cc0000; }

  .home-subtitle {
    font-size: clamp(12px, 3vw, 15px);
    color: #ccc;
    font-weight: 300;
    margin-bottom: 28px;
  }
  .home-subtitle em { color: #cc0000; font-style: normal; }

  .start-btn {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: 14px 40px;
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    width: 80%;
    max-width: 280px;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #aa0000; }

  .home-footer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    flex-shrink: 0;
  }
  .footer-cell {
    background: #111;
    padding: 16px 12px;
    text-align: center;
  }
  .footer-cell .big { font-size: clamp(16px, 4vw, 22px); font-weight: 700; line-height: 1.1; }
  .footer-cell .small { font-size: clamp(9px, 2vw, 11px); color: #aaa; letter-spacing: 1px; margin-top: 4px; }

  /* ===== RESULT SCREEN ===== */
  #result {
    justify-content: center;
    padding: 30px 24px;
    text-align: center;
  }
  .result-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #aaa;
    margin-bottom: 16px;
  }
  .result-title {
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 400;
    text-transform: uppercase;
    margin-bottom: 20px;
    line-height: 1.2;
  }
  .result-verse {
    font-size: clamp(13px, 3.5vw, 16px);
    color: #ccc;
    font-style: italic;
    line-height: 1.6;
    margin-bottom: 8px;
    font-weight: 300;
  }
  .result-ref {
    color: #cc0000;
    font-size: 13px;
    letter-spacing: 1px;
    margin-bottom: 30px;
  }
  .restart-btn {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: 14px 30px;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    width: 100%;
  }
</style>
</head>
<body>

<!-- TOOLTIP OVERLAY -->
<div class="tooltip-overlay" id="tooltipOverlay" onclick="closeTooltip(event)">
  <div class="tooltip-box">
    <button class="tooltip-close" onclick="closeTooltipBtn()">×</button>
    <h3>Підказка для ведучого</h3>
    <p id="tooltipText"></p>
  </div>
</div>

<!-- HOME SCREEN -->
<div class="screen active" id="home">
  <div class="mosaic" id="mosaic"></div>

  <div class="home-content">
    <div class="home-logo">ТЕО<span>ТЕСТ</span>®</div>
    <div class="home-subtitle">10 запитань. <em>Назавжди</em> жити з відповідями.</div>
    <button class="start-btn" onclick="startTest()">РОЗПОЧАТИ ТЕСТ</button>
  </div>

  <div class="home-footer">
    <div class="footer-cell">
      <div class="big">РЕСУРСИ<br>ТЕОТЕСТ</div>
      <div class="small">ДЛЯ ВЕДУЧОГО</div>
    </div>
    <div class="footer-cell">
      <div class="big" style="color:#cc0000;">БІБЛІЙНІ<br>ОСНОВИ</div>
      <div class="small">КУРС ДЛЯ НОВАЧКІВ</div>
    </div>
  </div>
</div>

<!-- QUESTION SCREEN -->
<div class="screen" id="questionScreen">
  <div class="test-header">
    <div class="logo">ТЕО<span>ТЕСТ</span>®</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="question-screen">
    <div class="question-label">
      <span id="questionLabel">ЗАПИТАННЯ 1</span>
      <button class="hint-btn" onclick="showHint()">?</button>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <textarea class="notes-area" id="notesArea" placeholder="Додаткові коментарі"></textarea>
  </div>

  <button class="next-btn" onclick="nextQuestion()">ДАЛІ ›</button>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="result">
  <div class="test-header">
    <div class="logo">ТЕО<span>ТЕСТ</span>®</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px 24px; text-align:center;">
    <div class="result-label">ВАШ ПРОФІЛЬ</div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-verse" id="resultVerse"></div>
    <div class="result-ref" id="resultRef"></div>
    <button class="restart-btn" onclick="restartTest()">ПРОЙТИ ЩЕ РАЗ</button>
  </div>
</div>

<script>
// ===== MOSAIC =====
const symbols = ['✝','☪','✡','☯','☸','🕉','⛎','☦','🔯','⚛','∞','Ω','α','Ω','E=mc²','DNA','☁','🌌','👁','🕊','📖','🙏','⚖','🌍','💡'];
const mosaic = document.getElementById('mosaic');
for(let i=0; i<25; i++){
  const cell = document.createElement('div');
  cell.className = 'mosaic-cell';
  cell.innerHTML = `<span>${symbols[i % symbols.length]}</span>`;
  cell.style.background = `hsl(0,0%,${Math.floor(Math.random()*12)+5}%)`;
  mosaic.appendChild(cell);
}

// ===== QUESTIONS =====
const questions = [
  {
    q: "ЧИ ВІРИТЕ ВИ В ІСНУВАННЯ БОГА АБО ВИЩОЇ СИЛИ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Це вступне запитання визначає напрямок розмови. Воно не є звинуваченням — просто відправна точка. Слухайте уважно, не перебивайте. Будь-яка відповідь відкриває діалог.",
    branch: true
  },
  {
    q: "ЧИ ДУМАЄТЕ ВИ, ЩО ВСЕСВІТ МАВ ПОЧАТОК?",
    options: ["Так", "Ні", "Не знаю"],
    hint: "Питання про космологічний аргумент. Якщо людина каже 'так' — запитайте: 'А що, на вашу думку, було причиною?' Це природно веде до розмови про Творця."
  },
  {
    q: "ЧИ ВВАЖАЄТЕ ВИ, ЩО ІСНУЄ ОБ'ЄКТИВНА МОРАЛЬ — ДОБРО І ЗЛО, ЯКІ НЕ ЗАЛЕЖАТЬ ВІД ДУМКИ ЛЮДЕЙ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Моральний аргумент. Якщо людина каже 'так' — звідки береться ця мораль? Якщо 'ні' — чи означає це, що Голокост не був об'єктивно злом? Будьте делікатні."
  },
  {
    q: "ЧИ ЗНАХОДИТЕ ВИ ЯКИЙСЬ КІНЦЕВИЙ СЕНС АБО МЕТУ У ВСЕСВІТІ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Питання про телеологію — чи має все мету. Якщо людина відчуває сенс у житті, запитайте: 'Звідки він береться?' Це відкриває розмову про Бога як джерело сенсу."
  },
  {
    q: "ЧИ ВВАЖАЄТЕ ВИ, ЩО ЛЮДИНА — ЦЕ БІЛЬШЕ, НІЖ ПРОСТО ФІЗИЧНЕ ТІЛО?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Питання про душу і свідомість. Більшість людей інтуїтивно відчуває, що вони — більше ніж атоми. Це відкриває розмову про духовну природу людини."
  },
  {
    q: "ЧИ ВВАЖАЄТЕ ВИ, ЩО ПІСЛЯ СМЕРТІ ІСНУЄ ЩОСЬ ЩЕ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Питання про вічність. Більшість людей боїться смерті або сподівається на щось більше. Це природний місток до Євангелія — Бог вирішив проблему смерті через Христа."
  },
  {
    q: "ЧИ ЧИТАЛИ ВИ КОЛИ-НЕБУДЬ БІБЛІЮ?",
    options: ["Так, читав(ла)", "Ні, ніколи", "Трохи читав(ла)"],
    hint: "Це практичне питання. Якщо людина ніколи не читала — запропонуйте почати з Євангелія від Івана. Якщо читала — запитайте, що їх вразило або що було незрозумілим."
  },
  {
    q: "ЧИ ВВАЖАЄТЕ ВИ, ЩО ІСУС ХРИСТОС БУВ РЕАЛЬНОЮ ІСТОРИЧНОЮ ОСОБОЮ?",
    options: ["Так", "Ні", "Не впевнений(а)"],
    hint: "Більшість істориків погоджується з історичністю Ісуса. Це не питання віри, а факту. Якщо людина сумнівається — можна згадати Йосипа Флавія та інші нехристиянські джерела."
  },
  {
    q: "ЧИ ВІДКРИТІ ВИ ДО ТОГО, ЩОБ ДІЗНАТИСЯ БІЛЬШЕ ПРО ХРИСТА І ЙОГО ВЧЕННЯ?",
    options: ["Так, відкритий(а)", "Ні", "Можливо"],
    hint: "Це ключове питання готовності. Якщо 'так' або 'можливо' — запросіть на групу, курс або просто запропонуйте зустрітися ще раз. Не тисніть, якщо 'ні'."
  },
  {
    q: "ЧИ Є У ВАС ЗАПИТАННЯ ДО БОГА, НА ЯКІ ВИ ХОТІЛИ Б ОТРИМАТИ ВІДПОВІДЬ?",
    options: ["Так, є", "Ні", "Не думав(ла) про це"],
    hint: "Завершальне питання. Дайте людині висловитись. Запишіть їхні запитання. Це показує, що ви серйозно ставитесь до їхніх сумнівів і готові продовжити розмову."
  }
];

let currentQ = 0;
let answers = [];

function startTest() {
  currentQ = 0;
  answers = [];
  showQuestion();
  document.getElementById('home').classList.remove('active');
  document.getElementById('questionScreen').classList.add('active');
}

function showQuestion() {
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('questionLabel').textContent = `ЗАПИТАННЯ ${currentQ + 1}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('notesArea').value = answers[currentQ]?.note || '';

  // Progress
  document.getElementById('progressFill').style.width = `${((currentQ) / total) * 100}%`;

  // Options
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const label = document.createElement('label');
    label.className = 'option-label';
    const saved = answers[currentQ]?.answer;
    label.innerHTML = `
      <input type="radio" name="q${currentQ}" value="${i}" ${saved == i ? 'checked' : ''}>
      <div class="radio-circle"></div>
      <span class="option-text">${opt}</span>
    `;
    container.appendChild(label);
  });
}

function showHint() {
  const q = questions[currentQ];
  document.getElementById('tooltipText').textContent = q.hint;
  document.getElementById('tooltipOverlay').classList.add('show');
}

function closeTooltip(e) {
  if(e.target === document.getElementById('tooltipOverlay')) {
    document.getElementById('tooltipOverlay').classList.remove('show');
  }
}
function closeTooltipBtn() {
  document.getElementById('tooltipOverlay').classList.remove('show');
}

function nextQuestion() {
  const selected = document.querySelector(`input[name="q${currentQ}"]:checked`);
  const note = document.getElementById('notesArea').value;
  answers[currentQ] = { answer: selected ? selected.value : null, note };

  if(currentQ < questions.length - 1) {
    currentQ++;
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('questionScreen').classList.remove('active');
  document.getElementById('result').classList.add('active');

  // Simple profiling based on Q1 answer
  const q1 = answers[0]?.answer;
  const q9 = answers[8]?.answer;

  let title, verse, ref;
  if(q1 === '0') {
    title = "ЛЮДИНА ВІРИ";
    verse = ""Бо так полюбив Бог світ, що дав Сина Свого Єдинородного, щоб кожен, хто вірує в Нього, не загинув, але мав життя вічне."";
    ref = "Іван 3:16";
  } else if(q1 === '1') {
    title = "ШУКАЧ ІСТИНИ";
    verse = ""Шукайте — і знайдете, стукайте — і відчинять вам."";
    ref = "Матвій 7:7";
  } else {
    title = "ДУХОВНИЙ МАНДРІВНИК";
    verse = ""Я є дорога, і правда, і життя."";
    ref = "Іван 14:6";
  }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultVerse').textContent = verse;
  document.getElementById('resultRef').textContent = `— ${ref}`;
  document.getElementById('progressFill').style.width = '100%';
}

function restartTest() {
  document.getElementById('result').classList.remove('active');
  document.getElementById('home').classList.add('active');
}
</script>
</body>
</html>
